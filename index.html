<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Bloom</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;background:#1a0c06;}
body{font-family:'Nunito',system-ui,sans-serif;color:#fef0e6;}
::-webkit-scrollbar{display:none;}
button{font-family:'Nunito',system-ui,sans-serif;}
input{font-family:'Nunito',system-ui,sans-serif;}

@keyframes charWalk{0%{transform:translateX(18px) scaleX(1);}49%{transform:translateX(224px) scaleX(1);}50%{transform:translateX(224px) scaleX(-1);}99%{transform:translateX(18px) scaleX(-1);}100%{transform:translateX(18px) scaleX(1);}}
@keyframes bodyBob{0%,100%{transform:translateY(0);}25%,75%{transform:translateY(-3px);}}
@keyframes armL{0%,100%{transform:rotate(30deg);}50%{transform:rotate(-30deg);}}
@keyframes armR{0%,100%{transform:rotate(-30deg);}50%{transform:rotate(30deg);}}
@keyframes legL{0%,100%{transform:rotate(26deg);}50%{transform:rotate(-26deg);}}
@keyframes legR{0%,100%{transform:rotate(-26deg);}50%{transform:rotate(26deg);}}
@keyframes breathe{0%,100%{transform:scaleY(1);}50%{transform:scaleY(1.04);}}
@keyframes sitBob{0%,100%{transform:translateY(0);}50%{transform:translateY(-1.5px);}}
@keyframes steam{0%{opacity:.7;transform:translateY(0);}100%{opacity:0;transform:translateY(-18px);}}
@keyframes starTwinkle{0%,100%{opacity:.45;}50%{opacity:1;}}
@keyframes lampGlow{0%,100%{opacity:.5;}50%{opacity:.95;}}
@keyframes firefly{0%,100%{opacity:.2;transform:translate(0,0);}25%{opacity:1;transform:translate(4px,-6px);}50%{opacity:.5;transform:translate(8px,-2px);}75%{opacity:.9;transform:translate(2px,-9px);}}
@keyframes thoughtIn{0%{opacity:0;transform:scale(.8) translateY(4px);}100%{opacity:1;transform:scale(1) translateY(0);}}
@keyframes screenIn{from{opacity:0;transform:translateY(9px);}to{opacity:1;transform:translateY(0);}}
@keyframes callRing{0%,100%{box-shadow:0 0 0 0 rgba(76,175,125,.45);}50%{box-shadow:0 0 0 18px rgba(76,175,125,0);}}
@keyframes kickPop{0%{transform:scale(1);}35%{transform:scale(1.16);}65%{transform:scale(.95);}100%{transform:scale(1);}}
@keyframes zonePulse{0%,100%{opacity:.55;transform:scale(1);}50%{opacity:1;transform:scale(1.06);}}
@keyframes pathwayPulse{0%,100%{opacity:.7;}50%{opacity:1;}}
@keyframes onboardIn{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}

.screen{animation:screenIn .28s cubic-bezier(.2,.8,.3,1) both;}
.onboard-in{animation:onboardIn .4s cubic-bezier(.2,.8,.3,1) both;}
.kick-pop{animation:kickPop .38s ease-out;}
.zone-pulse{animation:zonePulse 2.8s ease-in-out infinite;transform-origin:center;}
.thought-in{animation:thoughtIn .25s ease-out both;}

#app{width:100%;height:100%;display:flex;flex-direction:column;overflow:hidden;}
.tab-content{flex:1;overflow-y:auto;display:flex;flex-direction:column;min-height:0;}
</style>
</head>
<body>
<div id="app"></div>

function computeStreak(logs){
  if(!logs||!logs.length)return 0;
  var today=new Date();today.setHours(0,0,0,0);var streak=0;
  for(var i=0;i<60;i++){var d=new Date(today);d.setDate(today.getDate()-i);var ds=d.toISOString().slice(0,10);if(logs.find(function(l){return l.date===ds;})){streak++;}else if(i>0)break;}
  return streak;
}

function ns(tag,attrs,children){
  var el=document.createElementNS('http://www.w3.org/2000/svg',tag);
  if(attrs)Object.keys(attrs).forEach(function(k){if(k==='style'&&typeof attrs[k]==='object'){Object.assign(el.style,attrs[k]);}else el.setAttribute(k,attrs[k]);});
  if(children)children.forEach(function(c){if(c)el.appendChild(c);});
  return el;
}
function h(tag,attrs,children){
  var el=document.createElement(tag);
  if(attrs)Object.keys(attrs).forEach(function(k){
    if(k==='style'&&typeof attrs[k]==='object'){Object.assign(el.style,attrs[k]);}
    else if(k==='class')el.className=attrs[k];
    else if(k==='onclick')el.onclick=attrs[k];
    else if(k==='oninput')el.oninput=attrs[k];
    else if(k==='type')el.type=attrs[k];
    else if(k==='placeholder')el.placeholder=attrs[k];
    else if(k==='value')el.value=attrs[k];
    else if(k==='min')el.min=attrs[k];
    else if(k==='max')el.max=attrs[k];
    else if(k==='step')el.step=attrs[k];
    else el.setAttribute(k,attrs[k]);
  });
  if(children)children.forEach(function(c){if(c!=null&&c!==false){if(typeof c==='string'){el.appendChild(document.createTextNode(c));}else el.appendChild(c);}});
  return el;
}

}
