<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bloom Bold v6</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="ios-frame.jsx"></script>
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
    html,body{height:100%;overflow:hidden;}
    body{background:radial-gradient(ellipse at 50% 60%,#2a1208,#0c0604);display:flex;align-items:center;justify-content:center;font-family:'Nunito',sans-serif;}
    ::-webkit-scrollbar{display:none;}

    @keyframes charWalk{0%{transform:translateX(18px) scaleX(1);}49%{transform:translateX(224px) scaleX(1);}50%{transform:translateX(224px) scaleX(-1);}99%{transform:translateX(18px) scaleX(-1);}100%{transform:translateX(18px) scaleX(1);}}
    @keyframes bodyBob{0%,100%{transform:translateY(0);}25%,75%{transform:translateY(-3px);}}
    @keyframes armL{0%,100%{transform:rotate(30deg);}50%{transform:rotate(-30deg);}}
    @keyframes armR{0%,100%{transform:rotate(-30deg);}50%{transform:rotate(30deg);}}
    @keyframes legL{0%,100%{transform:rotate(26deg);}50%{transform:rotate(-26deg);}}
    @keyframes legR{0%,100%{transform:rotate(-26deg);}50%{transform:rotate(26deg);}}
    @keyframes breathe{0%,100%{transform:scaleY(1);}50%{transform:scaleY(1.04);}}
    @keyframes sitBob{0%,100%{transform:translateY(0);}50%{transform:translateY(-1.5px);}}
    @keyframes steam{0%{opacity:.7;transform:translateY(0);}100%{opacity:0;transform:translateY(-18px);}}
    @keyframes zzz{0%{opacity:0;transform:translate(0,0) scale(.7);}30%{opacity:1;}100%{opacity:0;transform:translate(10px,-22px) scale(1.2);}}
    @keyframes starTwinkle{0%,100%{opacity:.45;}50%{opacity:1;}}
    @keyframes lampGlow{0%,100%{opacity:.5;}50%{opacity:.95;}}
    @keyframes firefly{0%,100%{opacity:.2;transform:translate(0,0);}25%{opacity:1;transform:translate(4px,-6px);}50%{opacity:.5;transform:translate(8px,-2px);}75%{opacity:.9;transform:translate(2px,-9px);}}
    @keyframes thoughtIn{0%{opacity:0;transform:scale(.8) translateY(4px);}100%{opacity:1;transform:scale(1) translateY(0);}}
    @keyframes tapBounce{0%{transform:scale(1);}30%{transform:scale(.88) rotate(-8deg);}60%{transform:scale(1.06) rotate(2deg);}100%{transform:scale(1) rotate(0deg);}}
    @keyframes screenIn{from{opacity:0;transform:translateY(9px);}to{opacity:1;transform:translateY(0);}}
    @keyframes slideLeft{from{opacity:0;transform:translateX(24px);}to{opacity:1;transform:translateX(0);}}
    @keyframes callRing{0%,100%{box-shadow:0 0 0 0 rgba(76,175,125,.45);}50%{box-shadow:0 0 0 18px rgba(76,175,125,0);}}
    @keyframes kickPop{0%{transform:scale(1);}35%{transform:scale(1.16);}65%{transform:scale(.95);}100%{transform:scale(1);}}
    @keyframes zonePulse{0%,100%{opacity:.55;transform:scale(1);}50%{opacity:1;transform:scale(1.06);}}
    @keyframes floatUp{0%{opacity:0;transform:translateY(0) scale(.8);}20%{opacity:1;}100%{opacity:0;transform:translateY(-30px) scale(1.1);}}
    @keyframes pathwayPulse{0%,100%{opacity:.7;}50%{opacity:1;}}
    @keyframes onboardIn{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}

    .screen{animation:screenIn .28s cubic-bezier(.2,.8,.3,1) both;}
    .slide-left{animation:slideLeft .3s cubic-bezier(.2,.8,.3,1) both;}
    .kick-pop{animation:kickPop .38s ease-out;}
    .zone-pulse{animation:zonePulse 2.8s ease-in-out infinite;transform-origin:center;}
    .pathway-pulse{animation:pathwayPulse 3s ease-in-out infinite;}
    .onboard-in{animation:onboardIn .4s cubic-bezier(.2,.8,.3,1) both;}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "week": 24,
  "streakDays": 12,
  "name": "Sophia",
  "pathway": "standard",
  "showOnboarding": false
}/*EDITMODE-END*/;

const T={bg:'#1a0c06',bgDeep:'#110804',card:'rgba(255,255,255,0.07)',cardGlow:'rgba(255,107,74,0.13)',primary:'#ff6b4a',accent:'#ffaa7a',green:'#4caf7d',amber:'#ffcc66',text:'#fef0e6',muted:'rgba(254,240,230,0.48)',border:'rgba(255,255,255,0.09)',tabBg:'rgba(14,7,3,0.92)'};

// ── Clinical pathways ──────────────────────────────────────────
const PATHWAYS = {
  standard: {
    id:'standard', label:'Standard Pathway', icon:'🌱', color:T.green,
    desc:'Low-risk pregnancy — everything on track',
    extraMilestones:[],
    watchFor:[], reassure:'',
  },
  highBP: {
    id:'highBP', label:'Gestational Hypertension', icon:'🫀', color:'#ff9a4a',
    desc:'Enhanced blood pressure monitoring pathway',
    badge:'BP Monitored',
    extraMilestones:[
      {w:20,title:'Weekly BP monitoring begins',desc:'Check and log blood pressure every 3–4 days',urgent:false,icon:'📊'},
      {w:24,title:'Preeclampsia screening',desc:'Protein in urine test + full BP review with midwife',urgent:true,icon:'⚠️'},
      {w:28,title:'Maternal medicine review',desc:'Specialist review if BP remains above 140/90',urgent:false,icon:'🏥'},
      {w:34,title:'Delivery planning discussion',desc:'Discuss birth timing and options with your consultant',urgent:false,icon:'📋'},
    ],
    watchFor:[
      {s:'Severe headache that won\'t go away',icon:'🤕'},
      {s:'Visual disturbances — flashing lights or blurred vision',icon:'👁️'},
      {s:'Sudden swelling of face, hands or feet',icon:'🌊'},
      {s:'Upper belly pain below the ribs',icon:'🫁'},
      {s:'Reduced fetal movement',icon:'🦶'},
    ],
    reassure:'Gestational hypertension is manageable with close monitoring. Most mums on this pathway have healthy babies. We track your BP closely and will alert you if readings need attention from your midwife.',
    simMood:'calm',
  },
  gd: {
    id:'gd', label:'Gestational Diabetes', icon:'🩸', color:'#5ab4ff',
    desc:'Blood glucose monitoring pathway',
    badge:'Glucose Monitored',
    extraMilestones:[
      {w:24,title:'Daily glucose monitoring',desc:'Check blood sugar 4× daily — before and 1h after meals',urgent:false,icon:'📊'},
      {w:26,title:'Dietitian appointment',desc:'Personalised meal plan to keep glucose in range',urgent:false,icon:'🥗'},
      {w:32,title:'Growth scan + glucose review',desc:'GD can cause larger babies — we monitor size carefully',urgent:false,icon:'🔬'},
      {w:36,title:'Birth plan review',desc:'Discuss timing and delivery method with your team',urgent:false,icon:'📋'},
    ],
    watchFor:[
      {s:'Blood sugar above 7.8 mmol/L after meals',icon:'📈'},
      {s:'Excessive thirst beyond usual pregnancy',icon:'💧'},
      {s:'Blurred vision after eating',icon:'👁️'},
      {s:'Very low energy or shakiness between meals',icon:'⚡'},
      {s:'Baby feels significantly more active than usual',icon:'🦶'},
    ],
    reassure:'Gestational diabetes is well controlled with diet and sometimes medication. Most mums with GD have straightforward pregnancies. Your glucose levels directly affect baby\'s growth rate — monitoring keeps you both safe.',
    simMood:'calm',
  },
};

// ── Milestone data ─────────────────────────────────────────────
const MILESTONES=[
  {w:8, e:'🫐',size:'blueberry',g:1,energy:2,charState:'resting',feel:['Morning sickness','Extreme fatigue','Tender breasts'],reassure:'Morning sickness is a sign of strong hormone levels — actually reassuring. Peaks at weeks 8–10 then fades for most mums.',scan:null},
  {w:12,e:'🍋',size:'lime',g:58,energy:3,charState:'sitting',feel:['Nausea easing','Still tired','Mood swings'],reassure:'Your body has been building the placenta from scratch. Energy returns soon.',scan:'First trimester scan'},
  {w:16,e:'🥑',size:'avocado',g:100,energy:4,charState:'walking',feel:['Energy returning','Round ligament pain','Glowing skin'],reassure:'Round ligament pain is the ligaments supporting your uterus stretching. Completely normal — not a warning sign.',scan:null},
  {w:20,e:'🍌',size:'banana',g:300,energy:4,charState:'walking',feel:['First flutters','Heartburn starting','Good energy'],reassure:'Those first little flutters are baby moving. If you don\'t feel them yet, position of the placenta may delay it. They\'ll come.',scan:'Anomaly scan (20 weeks)'},
  {w:24,e:'🌽',size:'ear of corn',g:600,energy:3,charState:'walking',feel:['Braxton Hicks','Round ligament pain','Heartburn'],reassure:'Braxton Hicks are painless, irregular, and stop if you change position. Your uterus is simply practising for birth.',scan:'Glucose screening (24–28w)'},
  {w:28,e:'🍆',size:'aubergine',g:1000,energy:3,charState:'sitting',feel:['Back ache','Breathlessness','Leg cramps'],reassure:'Breathlessness is baby pressing on your diaphragm. Sleeping on your left side gives your lungs more room.',scan:'Whooping cough vaccine (27–36w)'},
  {w:32,e:'🥥',size:'coconut',g:1700,energy:2,charState:'sitting',feel:['Swollen ankles','Frequent wees','Pelvic pressure'],reassure:'Swollen ankles are very common — fluid pools due to gravity. Elevate feet for 20 minutes and it improves.',scan:'Growth scan (32 weeks)'},
  {w:36,e:'🍈',size:'honeydew',g:2600,energy:2,charState:'resting',feel:['Baby dropping','Pelvic heaviness','Nesting energy'],reassure:'Pelvic pressure means baby is moving down — called engagement. Uncomfortable, but it means your body is preparing perfectly.',scan:'Group B Strep test (36w)'},
  {w:40,e:'🍉',size:'watermelon',g:3400,energy:3,charState:'contracting',feel:['Irregular tightenings','Everything feels significant','Restlessness'],reassure:'Real contractions come in a regular pattern, build in intensity, and don\'t stop with movement. If tightenings are 5+ min apart for an hour, call your midwife.',scan:'Due date 🎉'},
];
function getMilestone(w){return MILESTONES.reduce((a,b)=>Math.abs(b.w-w)<Math.abs(a.w-w)?b:a);}
const TRIM=w=>w<=13?1:w<=26?2:3;
const THOUGHTS=[w=>`Baby can hear you right now at week ${w} 🎵`,()=>'Stay hydrated — it helps with Braxton Hicks 💧',()=>'You\'re doing amazingly. Really. 🌸',()=>'A short walk can ease back ache 🚶‍♀️',w=>`Only ${40-w} weeks to go!`,()=>'Tap the kick counter each time you feel movement 🦶'];

// ── Shared primitives ──────────────────────────────────────────
function Card({children,style={},onClick,glow,pathwayColor}){
  const bg = pathwayColor ? `${pathwayColor}18` : glow ? T.cardGlow : T.card;
  const border = pathwayColor ? `1px solid ${pathwayColor}40` : `1px solid ${glow?'rgba(255,107,74,0.25)':T.border}`;
  return<div onClick={onClick} style={{background:bg,borderRadius:20,padding:'14px 16px',border,cursor:onClick?'pointer':'default',...style}}>{children}</div>;
}
function Lbl({children,style={},color}){return<div style={{fontSize:10,fontWeight:800,color:color||T.muted,letterSpacing:1.2,textTransform:'uppercase',marginBottom:9,...style}}>{children}</div>;}
function Btn({children,onClick,color,style={}}){return<button onClick={onClick} style={{width:'100%',padding:'15px',borderRadius:16,border:'none',cursor:'pointer',background:color||T.primary,color:'#fff',fontSize:15,fontWeight:800,fontFamily:'Nunito,sans-serif',...style}}>{children}</button>;}
function StreakRing({streak,goal=14,size=56}){const r=size/2-4,c=2*Math.PI*r,pct=Math.min(streak/goal,1);return<div style={{width:size,height:size,position:'relative',flexShrink:0}}><svg width={size} height={size}><circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(255,255,255,0.1)" strokeWidth={3.5}/><circle cx={size/2} cy={size/2} r={r} fill="none" stroke={T.primary} strokeWidth={3.5} strokeDasharray={`${c*pct} ${c}`} strokeLinecap="round" transform={`rotate(-90 ${size/2} ${size/2})`} style={{filter:`drop-shadow(0 0 5px ${T.primary})`}}/></svg><div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'}}><span style={{fontSize:13,fontWeight:900,color:T.primary,lineHeight:1}}>{streak}</span><span style={{fontSize:6.5,fontWeight:800,color:T.muted,letterSpacing:.8}}>DAYS</span></div></div>;}

// ── Hero Scene (reused from v5, compact) ───────────────────────
const STARS=Array.from({length:20},(_,i)=>({x:Math.sin(i*137.5)*140+181,y:Math.cos(i*89.3)*50+38,r:Math.sin(i*23)*.7+.9,d:i*.38}));

function HeroScene({charState,streak,loggedToday,onTap,thought,pathwayColor}){
  const isHome=charState==='resting'||charState==='sitting'||charState==='contracting';
  const isWalk=charState==='walking';
  const skin='#f4c4a8',hair='#3d1f0e',dress=loggedToday?'#ff8c6a':'#8a6a58',shoe='#c8654a';
  const lL={animation:'legL .58s ease-in-out infinite',transformOrigin:'-7px -30px',transformBox:'fill-box'};
  const lR={animation:'legR .58s ease-in-out infinite',transformOrigin:'7px -30px',transformBox:'fill-box'};
  const aL={animation:'armL .58s ease-in-out infinite',transformOrigin:'-14px -68px',transformBox:'fill-box'};
  const aR={animation:'armR .58s ease-in-out infinite',transformOrigin:'14px -68px',transformBox:'fill-box'};

  const WalkChar=()=>(
    <g style={{animation:'bodyBob .58s ease-in-out infinite'}}>
      <ellipse cx="0" cy="4" rx="16" ry="4.5" fill="rgba(0,0,0,0.22)"/>
      <g style={lR}><rect x="2" y="-30" width="9" height="30" rx="4.5" fill={dress} opacity=".75"/><ellipse cx="7" cy="2" rx="7" ry="3.5" fill={shoe} opacity=".75"/></g>
      <rect x="-16" y="-72" width="32" height="44" rx="10" fill={dress}/>
      <ellipse cx="13" cy="-50" rx="17" ry="15" fill={dress}/>
      <ellipse cx="14" cy="-55" rx="8" ry="6" fill="rgba(255,255,255,0.14)"/>
      <g style={aR}><rect x="13" y="-70" width="9" height="24" rx="4.5" fill={skin} opacity=".78"/></g>
      <g style={lL}><rect x="-11" y="-30" width="9" height="30" rx="4.5" fill={dress}/><ellipse cx="-7" cy="2" rx="7" ry="3.5" fill={shoe}/></g>
      <g style={aL}><rect x="-22" y="-70" width="9" height="24" rx="4.5" fill={skin}/></g>
      <rect x="-4.5" y="-77" width="9" height="8" rx="3.5" fill={skin}/>
      <circle cx="0" cy="-90" r="15" fill={skin}/>
      <ellipse cx="-2" cy="-102" rx="15" ry="8" fill={hair}/>
      <ellipse cx="-14" cy="-95" rx="5.5" ry="9" fill={hair}/>
      <circle cx="12" cy="-102" r="6" fill={hair}/>
      {streak>=7&&<><circle cx="14" cy="-103" r="5" fill="#ff6b4a" opacity=".9"/><circle cx="14" cy="-103" r="2.5" fill="#ffee99"/></>}
      <circle cx="6" cy="-90" r="2.8" fill="#2d1a10"/>
      <circle cx="7.2" cy="-91.2" r="1.1" fill="white"/>
      <path d={loggedToday?"M3,-84 Q7,-81 10,-84":"M3,-84 Q7,-85 10,-84"} stroke="#2d1a10" strokeWidth="1.4" fill="none" strokeLinecap="round"/>
      <circle cx="11" cy="-86" r="4" fill="rgba(255,150,100,0.22)"/>
      {thought&&<g style={{animation:'thoughtIn .25s ease-out both'}}><ellipse cx="28" cy="-115" rx="44" ry="17" fill="rgba(255,240,230,0.95)" stroke="rgba(255,107,74,0.3)" strokeWidth="1"/><circle cx="14" cy="-106" r="3" fill="rgba(255,240,230,0.95)"/><circle cx="18" cy="-109" r="2" fill="rgba(255,240,230,0.95)"/><text x="28" y="-113" textAnchor="middle" fontSize="7" fill="#2d1a10" fontFamily="Nunito" fontWeight="700">{thought.slice(0,28)}</text>{thought.length>28&&<text x="28" y="-104" textAnchor="middle" fontSize="7" fill="#2d1a10" fontFamily="Nunito" fontWeight="600">{thought.slice(28,52)}</text>}</g>}
    </g>
  );

  const SitChar=()=>(
    <g style={{animation:'sitBob 3.5s ease-in-out infinite'}}>
      <rect x="-18" y="-10" width="14" height="20" rx="5" fill={dress}/><rect x="4" y="-10" width="14" height="20" rx="5" fill={dress}/>
      <ellipse cx="-11" cy="12" rx="9" ry="4" fill={shoe}/><ellipse cx="11" cy="12" rx="9" ry="4" fill={shoe}/>
      <rect x="-17" y="-55" width="34" height="48" rx="11" fill={dress} style={{animation:'breathe 3.2s ease-in-out infinite',transformOrigin:'0 -30px',transformBox:'fill-box'}}/>
      <ellipse cx="0" cy="-32" rx="18" ry="15" fill={dress}/><ellipse cx="0" cy="-36" rx="9" ry="7" fill="rgba(255,255,255,0.14)"/>
      <rect x="-26" y="-50" width="10" height="20" rx="5" fill={skin}/>
      <rect x="16" y="-50" width="10" height="20" rx="5" fill={skin}/>
      <rect x="16" y="-34" width="14" height="12" rx="4" fill="rgba(255,200,150,0.75)" stroke="rgba(255,255,255,0.2)" strokeWidth="1"/>
      <path d="M30,-31 Q35,-31 35,-27 Q35,-23 30,-23" fill="none" stroke="rgba(255,200,150,0.75)" strokeWidth="1.8" strokeLinecap="round"/>
      {[0,1].map(i=><g key={i} style={{animation:`steam ${1.8+i*.5}s ease-out infinite`,animationDelay:`${i*.6}s`}}><path d={`M${20+i*4},-36 Q${22+i*4},-43 ${20+i*4},-49`} fill="none" stroke="rgba(255,220,180,0.5)" strokeWidth="1.3" strokeLinecap="round"/></g>)}
      <rect x="-4" y="-62" width="8" height="9" rx="3.5" fill={skin}/>
      <circle cx="0" cy="-74" r="14" fill={skin}/>
      <ellipse cx="0" cy="-85" rx="15" ry="7.5" fill={hair}/><ellipse cx="-13" cy="-80" rx="5" ry="8" fill={hair}/><circle cx="12" cy="-85" r="6" fill={hair}/>
      {streak>=7&&<><circle cx="13" cy="-86" r="5" fill="#ff6b4a" opacity=".9"/><circle cx="13" cy="-86" r="2.5" fill="#ffee99"/></>}
      <circle cx="-5" cy="-74" r="2.8" fill="#2d1a10"/><circle cx="5" cy="-74" r="2.8" fill="#2d1a10"/>
      <path d={loggedToday?"M-4,-68 Q0,-65 4,-68":"M-4,-68 L4,-68"} stroke="#2d1a10" strokeWidth="1.4" fill="none" strokeLinecap="round"/>
      {thought&&<g style={{animation:'thoughtIn .25s ease-out both'}}><ellipse cx="0" cy="-96" rx="44" ry="15" fill="rgba(255,240,230,0.95)" stroke="rgba(255,107,74,0.3)" strokeWidth="1"/><circle cx="0" cy="-88" r="3" fill="rgba(255,240,230,0.95)"/><text x="0" y="-94" textAnchor="middle" fontSize="7" fill="#2d1a10" fontFamily="Nunito" fontWeight="700">{thought.slice(0,26)}</text></g>}
    </g>
  );

  const parkBg = () => (
    <svg viewBox="0 0 362 255" width="100%" height="100%" style={{display:'block',position:'absolute',inset:0}} onClick={onTap}>
      <defs>
        <linearGradient id="ps6" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#120a30"/><stop offset="65%" stopColor="#2d1520"/><stop offset="100%" stopColor="#6B2e18"/></linearGradient>
        <linearGradient id="pg6" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#2a4a1a"/><stop offset="100%" stopColor="#1a2d0e"/></linearGradient>
        <radialGradient id="lg6" cx="50%" cy="30%" r="70%"><stop offset="0%" stopColor="#ffcc66" stopOpacity=".42"/><stop offset="100%" stopColor="transparent"/></radialGradient>
        <radialGradient id="mg6" cx="50%" cy="50%" r="50%"><stop offset="0%" stopColor="#ffe8b0" stopOpacity=".3"/><stop offset="100%" stopColor="transparent"/></radialGradient>
      </defs>
      <rect width="362" height="255" fill="url(#ps6)"/>
      <circle cx="310" cy="42" r="44" fill="url(#mg6)"/>
      <circle cx="310" cy="42" r="20" fill="#ffe8b0" opacity=".88"/>
      <circle cx="318" cy="37" r="16" fill="#120a30"/>
      {STARS.map((s,i)=><circle key={i} cx={s.x*.88} cy={s.y} r={s.r} fill="white" style={{animation:`starTwinkle ${2+s.d}s ease-in-out infinite`,animationDelay:`${s.d}s`}}/>)}
      <ellipse cx="181" cy="175" rx="230" ry="38" fill="rgba(200,80,30,0.16)"/>
      <path d="M0,165 Q90,130 181,148 Q272,166 362,145 L362,255 L0,255Z" fill="#1a2d10"/>
      <rect y="180" width="362" height="75" fill="url(#pg6)"/>
      <ellipse cx="181" cy="202" rx="145" ry="14" fill="rgba(180,130,70,0.22)"/>
      <rect x="20" y="136" width="6" height="46" rx="3" fill="#1a1a0e"/>
      <ellipse cx="23" cy="128" rx="20" ry="25" fill="#1e3014"/>
      <ellipse cx="23" cy="119" rx="14" ry="18" fill="#243819"/>
      <rect x="322" y="140" width="5.5" height="42" rx="2.75" fill="#1a1a0e"/>
      <ellipse cx="325" cy="132" rx="17" ry="22" fill="#1e3014"/>
      <rect x="244" y="140" width="4" height="44" rx="2" fill="#3d3d2a"/>
      <ellipse cx="246" cy="138" rx="11" ry="5" fill="#5a5a3a"/>
      <ellipse cx="246" cy="138" rx="18" ry="24" fill="url(#lg6)" style={{animation:'lampGlow 3s ease-in-out infinite'}}/>
      <circle cx="246" cy="138" r="4.5" fill="#ffee99"/>
      {[48,76,112,148,198,228].slice(0,streak>=3?6:2).map(x=><g key={x}><line x1={x} y1="196" x2={x} y2="188" stroke="#2d5a1a" strokeWidth="1.4"/><circle cx={x} cy="187" r={streak>=7?4:3.5} fill={['#ff6b4a','#ffaa7a','#ff8c6a','#ffd4aa','#ffcc66','#ff9a70'][x%6]}/></g>)}

// ── Journey tab ────────────────────────────────────────────────
function JourneyTab({ week, streak, name, pathway }) {
  const m = getMilestone(week);
  const [bouncing, setBouncing] = React.useState(false);
  const [thought, setThought] = React.useState(null);
  const [mood, setMood] = React.useState('happy');
  const [energy, setEnergy] = React.useState(m.energy);
  const [kicks, setKicks] = React.useState(0);
  const [kickAnim, setKickAnim] = React.useState(false);
  const [expandedWeek, setExpandedWeek] = React.useState(null);
  const loggedToday = true;

  const charState = React.useMemo(()=>{
    if (mood==='tired'||energy<=1) return 'resting';
    if (energy<=2||mood==='tired') return 'sitting';
    if (energy>=4&&(mood==='happy'||mood==='calm')) return m.charState;
    return 'sitting';
  },[mood,energy,m.charState]);

  const handleTap = () => {
    if (bouncing) return;
    setBouncing(true);
    const msg = THOUGHTS[Math.floor(Math.random()*THOUGHTS.length)](week);
    setThought(msg);
    setTimeout(()=>setThought(null),3200);
    setTimeout(()=>setBouncing(false),500);
  };

  const addKick = () => { setKicks(k=>k+1); setKickAnim(true); setTimeout(()=>setKickAnim(false),400); };
  const moodOpts=[{id:'happy',e:'😊',l:'Great'},{id:'calm',e:'😌',l:'Calm'},{id:'tired',e:'😴',l:'Tired'},{id:'anxious',e:'😟',l:'Worried'}];

  const futureMilestones=MILESTONES.filter(mi=>mi.w>week);
  const nextMilestone=futureMilestones[0];
  const nextScan=futureMilestones.find(mi=>mi.scan);

            <span style={{fontSize:19,fontWeight:900,color:T.text}}>{name} 🌸</span>
            {pathway&&pathway.id!=='standard'&&(
              <span style={{fontSize:10,fontWeight:800,color:pathway.color,background:`${pathway.color}20`,

        </div>
        <StreakRing streak={streak}/>
      </div>

      {/* HERO SCENE */}
      <div style={{margin:'0 14px',borderRadius:18,overflow:'hidden',height:255,flexShrink:0,
        boxShadow:'0 8px 40px rgba(0,0,0,0.55), 0 0 0 1px rgba(255,255,255,0.06)',

        transform:bouncing?'scale(0.97)':'scale(1)',transition:'transform 0.18s',
      }}>
        <HeroScene charState={charState} streak={streak} loggedToday={loggedToday}
          onTap={handleTap} thought={thought} pathwayColor={pathway?.id!=='standard'?pathway?.color:null}/>
        {streak>=7&&(
          <div style={{position:'absolute',top:10,left:10,background:'rgba(14,7,3,0.75)',borderRadius:10,
            padding:'4px 10px',backdropFilter:'blur(8px)',border:`1px solid ${T.border}`,

      </div>

      {/* Caption */}
      <div style={{margin:'10px 14px 0',padding:'9px 14px',background:'rgba(255,255,255,0.05)',

        <div style={{fontSize:12.5,color:T.text,fontWeight:600}}>

          </div>
        </div>
      </div>
      <div style={{height:24}}/>
    </div>
  );

          <rect x="322" y="238" width="5.5" height="72" rx="2.75" fill="#1a1a0e"/><ellipse cx="325" cy="228" rx="18" ry="24" fill="#1e3014"/>
          <rect x="240" y="240" width="4" height="68" rx="2" fill="#3d3d2a"/><ellipse cx="242" cy="238" rx="12" ry="6" fill="#5a5a3a"/><ellipse cx="242" cy="238" rx="20" ry="28" fill="url(#oblg)" style={{animation:'lampGlow 3s ease-in-out infinite'}}/><circle cx="242" cy="238" r="5" fill="#ffee99"/>
          {[48,76,112,148,198,228].map(x=><g key={x}><line x1={x} y1="316" x2={x} y2="306" stroke="#2d5a1a" strokeWidth="1.4"/><circle cx={x} cy="305" r="4" fill={['#ff6b4a','#ffaa7a','#ff8c6a','#ffd4aa','#ffcc66','#ff9a70'][x%6]}/></g>)}
          {[1,2,3,4,5].map(i=><circle key={i} cx={60+i*52} cy={260+Math.sin(i*1.3)*18} r="2.8" fill={T.amber} style={{animation:`firefly ${2.2+i*.4}s ease-in-out infinite`,animationDelay:`${i*.55}s`,filter:'drop-shadow(0 0 4px #ffcc66)'}}/>)}
          {/* Walking character — larger */}
          <g style={{animation:'charWalk 7s ease-in-out infinite',transformOrigin:'center'}}>
            <g transform="translate(0,308) scale(1.3)">
              {/* Simplified inline char */}
              <ellipse cx="0" cy="4" rx="16" ry="4.5" fill="rgba(0,0,0,0.22)"/>
              <rect x="-16" y="-72" width="32" height="44" rx="10" fill="#ff8c6a"/>

              <ellipse cx="-2" cy="-102" rx="15" ry="8" fill="#3d1f0e"/>
              <ellipse cx="-14" cy="-95" rx="5.5" ry="9" fill="#3d1f0e"/>
              <circle cx="12" cy="-102" r="6" fill="#3d1f0e"/>
              <circle cx="14" cy="-103" r="5" fill="#ff6b4a" opacity=".9"/>
              <circle cx="14" cy="-103" r="2.5" fill="#ffee99"/>
              <circle cx="6" cy="-90" r="2.8" fill="#2d1a10"/>

        {/* Overlay text */}
        <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',justifyContent:'flex-end',padding:'28px 28px',background:'linear-gradient(transparent 50%, rgba(10,4,2,0.85))'}}>

          <div style={{fontSize:14,color:T.muted,lineHeight:1.7,marginBottom:24}}>
            She grows and changes with you every week. Log daily and watch her world come alive.
          </div>
          <Btn onClick={handleFinish} color={finalizing?T.green:T.primary}>
            {finalizing ? '✓ Setting up your journey...' : 'Begin my journey →'}
          </Btn>
        </div>
      </div>
    </div>,
  ];

  return (
    <div style={{width:'100%',height:'100%',background:T.bg,display:'flex',flexDirection:'column',fontFamily:'Nunito,sans-serif',overflow:'hidden'}}>
      {/* Progress dots */}
      {step<3&&(
        <div style={{height:58,display:'flex',alignItems:'flex-end',justifyContent:'center',gap:6,paddingBottom:12}}>
          {[0,1,2].map(i=><div key={i} style={{width:i===step?24:6,height:6,borderRadius:3,background:i===step?T.primary:'rgba(255,255,255,0.15)',transition:'all 0.3s'}}/>)}
        </div>
      )}
      {steps[step]}
    </div>
  );
}

y?'rgba(255,107,74,0.3)':T.border}`,display:'flex',flexDirection:'column',alignItems:'center',gap:5}}><div style={{fontSize:9.5,fontWeight:800,color:day.isToday?T.primary:T.muted}}>{day.dayLabel}</div><div style={{fontSize:day.isToday?22:18,lineHeight:1}}>{day.symptom.i}</div><div style={{display:'flex',gap:2}}>{[1,2,3,4,5].map(n=><div key={n} style={{width:4,height:4,borderRadius:1,background:n<=day.energy?ec(day.energy):'rgba(255,255,255,0.1)'}}/>)}</div><div style={{fontSize:8.5,fontWeight:700,color:T.muted,textAlign:'center',lineHeight:1.2}}>{day.symptom.l.split(' ')[0]}</div></div>)}</div></div><div style={{padding:'0 20px 24px',display:'flex',gap:12,alignItems:'flex-start'}}><Card style={{padding:'14px 12px',display:'flex',flexDirection:'column',alignItems:'center',flexShrink:0,width:168}}><Lbl style={{alignSelf:'flex-start'}}>Where you'll feel it</Lbl><svg viewBox="0 0 160 280" width="140" height="245" style={{overflow:'visible',flexShrink:0}}><defs><filter id="bmbf"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>{az.map(z=>{const g=zones[z];if(!g)return null;return<ellipse key={`g-${z}`} cx={g.cx} cy={g.cy} rx={g.rx+14} ry={g.ry+14} fill="rgba(255,107,74,0.18)" className="zone-pulse" style={{filter:'url(#bmbf)'}}/>;})} <ellipse cx="70" cy="28" rx="21" ry="23" fill="rgba(255,154,112,0.12)" stroke="#ff9a70" strokeWidth="1.5"/><path d="M62,50 L62,62 M78,50 L78,62" stroke="#ff9a70" strokeWidth="1.4" strokeLinecap="round"/><path d="M62,62 Q44,66 30,82 L26,120" fill="none" stroke="#ff9a70" strokeWidth="1.4" strokeLinecap="round"/><path d="M78,62 Q96,66 110,82 L110,120" fill="none" stroke="#ff9a70" strokeWidth="1.4" strokeLinecap="round"/><path d="M26,120 Q20,150 20,175 Q20,205 28,225 Q38,248 70,255" fill="none" stroke="#ff9a70" strokeWidth="1.4" strokeLinecap="round"/><path d="M110,120 Q116,150 116,175 Q116,205 108,225 Q98,248 70,255" fill="none" stroke="#ff9a70" strokeWidth="1.4" strokeLinecap="round"/><ellipse cx="70" cy="178" rx="46" ry="52" fill="rgba(255,107,74,0.07)" stroke="#ff6b4a" strokeWidth="2"/>{az.map(z=>{const g=zones[z];if(!g)return null;return<g key={`m-${z}`}><ellipse cx={g.cx} cy={g.cy} rx={g.rx} ry={g.ry} fill="rgba(255,107,74,0.22)" className="zone-pulse"/><circle cx={g.cx} cy={g.cy} r="4" fill={T.primary} opacity=".9"/></g>;})} {az.map(z=>{const g=zones[z];if(!g)return null;const il=g.lx<70;return<g key={`l-${z}`}><line x1={g.cx+(il?-g.rx:g.rx)} y1={g.cy} x2={g.lx+(il?-2:2)} y2={g.ly} stroke={T.primary} strokeWidth=".8" opacity=".5"/><text x={il?g.lx-2:g.lx+2} y={g.ly+1} textAnchor={il?'end':'start'} fontSize="8.5" fill={T.primary} fontFamily="Nunito" fontWeight="700">{g.label}</text></g>;})} </svg></Card><div style={{flex:1,display:'flex',flexDirection:'column',gap:9}}><Card style={{padding:'12px 14px'}}><Lbl>Baby this week</Lbl><div style={{fontSize:22,lineHeight:1,marginBottom:4}}>{b.e}</div><div style={{fontSize:13,fontWeight:800,color:T.text}}>Week {week}</div></Card><Card style={{padding:'12px 14px'}}><Lbl>Fact</Lbl><div style={{fontSize:12,color:T.text,lineHeight:1.55}}>{b.fact}</div></Card></div></div></div>;
}

function LogTab(){const[bp,setBp]=React.useState({s:'',d:''});const[kg,setKg]=React.useState('');const[sleep,setSleep]=React.useState(7);const[syms,setSyms]=React.useState([]);const[saved,setSaved]=React.useState(false);const sl=['Nausea','Headache','Swelling','Fatigue','Back pain','Braxton Hicks'];const tog=s=>setSyms(p=>p.includes(s)?p.filter(x=>x!==s):[...p,s]);const inp={padding:'10px 12px',borderRadius:11,fontSize:14,fontWeight:700,outline:'none',fontFamily:'Nunito',background:'rgba(255,255,255,0.06)',border:`1.5px solid ${T.border}`,color:T.text,width:'100%'};return<div className="screen" style={{flex:1,overflowY:'auto',background:T.bg,padding:'0 20px 24px'}}><div style={{height:58}}/><div style={{fontSize:24,fontWeight:900,color:T.text}}>Daily log</div><div style={{fontSize:13,color:T.muted,marginTop:2,marginBottom:18}}>Monday · April 21</div><div style={{display:'flex',flexDirection:'column',gap:12}}><Card><Lbl>Blood pressure</Lbl><div style={{display:'flex',gap:10,marginBottom:8}}>{[['Systolic','s','120'],['Diastolic','d','80']].map(([l,k,ph])=><div key={k} style={{flex:1}}><div style={{fontSize:10.5,color:T.muted,marginBottom:4,fontWeight:700}}>{l}</div><input style={inp} type="number" placeholder={ph} value={bp[k]} onChange={e=>setBp(p=>({...p,[k]:e.target.value}))}/></div>)}</div>{bp.s>=140&&<div style={{padding:'7px 10px',background:'rgba(255,100,50,0.15)',borderRadius:9,fontSize:11.5,color:T.primary,fontWeight:700}}>⚠️ Systolic ≥140 — log this and mention to your midwife</div>}</Card><div style={{display:'flex',gap:10}}><Card style={{flex:1,padding:'13px'}}><Lbl>Weight kg</Lbl><input style={{...inp,textAlign:'center',fontSize:20,fontWeight:900}} type="number" placeholder="—" value={kg} onChange={e=>setKg(e.target.value)}/></Card><Card style={{flex:1,padding:'13px'}}><Lbl>Sleep</Lbl><div style={{textAlign:'center',fontSize:20,fontWeight:900,color:T.text}}>{sleep}<span style={{fontSize:12,color:T.muted}}>h</span></div><input type="range" min="3" max="12" step=".5" value={sleep} onChange={e=>setSleep(+e.target.value)} style={{width:'100%',accentColor:T.primary,marginTop:6}}/></Card></div><Card><Lbl>Symptoms today</Lbl><div style={{display:'flex',flexWrap:'wrap',gap:7}}>{sl.map(s=>{const on=syms.includes(s);return<button key={s} onClick={()=>tog(s)} style={{padding:'7px 13px',borderRadius:20,border:`1.5px solid ${on?T.primary:'transparent'}`,cursor:'pointer',background:on?'rgba(255,107,74,0.22)':'rgba(255,255,255,0.06)',color:on?T.primary:T.text,fontFamily:'Nunito',fontSize:12.5,fontWeight:700,transition:'all 0.15s'}}>{s}</button>;})}</div></Card><Btn onClick={()=>{setSaved(true);setTimeout(()=>setSaved(false),2200)}} color={saved?T.green:T.primary}>{saved?'✓ Saved':'Save today\'s entry'}</Btn></div></div>;}

function DoctorsTab(){const[view,setView]=React.useState('list');const[dId,setDId]=React.useState(null);const[s,setS]=React.useState(0);React.useEffect(()=>{if(view!=='call')return;const id=setInterval(()=>setS(x=>x+1),1000);return()=>clearInterval(id);},[view]);const docs=[{id:1,name:'Dr. Sarah Mitchell',role:'Midwife & Consultant',rating:4.9,reviews:142,wait:'~5 min',spec:'High-risk pregnancy',avail:true,e:'👩‍⚕️'},{id:2,name:'Dr. James Okafor',role:'Obstetric Specialist',rating:4.8,reviews:89,wait:'~12 min',spec:'Fetal medicine',avail:true,e:'👨‍⚕️'},{id:3,name:'Dr. Priya Sharma',role:'Maternal–Fetal Medicine',rating:4.9,reviews:210,wait:'~20 min',spec:'Nutrition & wellness',avail:false,e:'👩‍⚕️'}];const doc=docs.find(d=>d.id===dId);const fmt=x=>`${String(Math.floor(x/60)).padStart(2,'0')}:${String(x%60).padStart(2,'0')}`;if(view==='call')return<div className="screen" style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'space-between',background:`radial-gradient(ellipse at 50% 30%,rgba(76,175,125,0.12),${T.bgDeep})`,padding:'58px 20px 40px'}}><div style={{textAlign:'center'}}><div style={{fontSize:10.5,color:'rgba(255,255,255,0.4)',letterSpacing:1.3,fontWeight:800}}>CONNECTED</div><div style={{fontSize:16,color:T.green,fontWeight:900,marginTop:4}}>{fmt(s)}</div></div><div style={{textAlign:'center'}}><div style={{width:116,height:116,borderRadius:58,background:`linear-gradient(135deg,${T.primary},${T.accent})`,margin:'0 auto 14px',display:'flex',alignItems:'center',justifyContent:'center',fontSize:48,animation:'callRing 2.4s ease-in-out infinite'}}>{doc?.e}</div><div style={{fontSize:20,fontWeight:900,color:T.text}}>{doc?.name}</div></div><Card style={{width:'100%',padding:'13px 16px',background:'rgba(255,255,255,0.05)'}}><div style={{fontSize:10,color:T.muted,letterSpacing:1.1,fontWeight:800,marginBottom:6}}>SHARED WITH DOCTOR</div><div style={{fontSize:13,color:'rgba(254,240,230,0.75)',lineHeight:1.6}}>Week 24 · BP 118/76 · Gestational Hypertension pathway · 🔥 12-day streak</div></Card><button onClick={()=>{setView('list');setS(0);}} style={{width:64,height:64,borderRadius:32,background:'#e53935',border:'none',cursor:'pointer',fontSize:24}}>📵</button></div>;if(view==='profile'&&doc)return<div className="screen" style={{flex:1,overflowY:'auto',background:T.bg,padding:'0 20px 24px'}}><div style={{height:58}}/><button onClick={()=>setView('list')} style={{background:'none',border:'none',cursor:'pointer',color:T.primary,fontFamily:'Nunito',fontWeight:800,fontSize:13.5,padding:0,marginBottom:14}}>← Specialists</button><div style={{display:'flex',gap:14,alignItems:'center',marginBottom:18}}><div style={{width:72,height:72,borderRadius:36,background:`linear-gradient(135deg,${T.primary},${T.accent})`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:34,flexShrink:0,boxShadow:`0 0 24px rgba(255,107,74,0.35)`}}>{doc.e}</div><div><div style={{fontSize:18,fontWeight:900,color:T.text}}>{doc.name}</div><div style={{fontSize:13,color:T.primary,fontWeight:800,marginTop:4}}>⭐ {doc.rating}</div></div></div><Btn onClick={()=>setView('call')}>Begin consult →</Btn></div>;return<div className="screen" style={{flex:1,overflowY:'auto',background:T.bg,padding:'0 20px 24px'}}><div style={{height:58}}/><div style={{fontSize:24,fontWeight:900,color:T.text}}>Specialists</div><div style={{fontSize:13,color:T.muted,marginTop:2,marginBottom:18}}>UK-based · doctor sees your full picture</div><div style={{display:'flex',flexDirection:'column',gap:11}}>{docs.map(d=><Card key={d.id} onClick={()=>{if(!d.avail)return;setDId(d.id);setView('profile');}} style={{opacity:d.avail?1:0.5,cursor:d.avail?'pointer':'default'}}><div style={{display:'flex',gap:13,alignItems:'center'}}><div style={{width:56,height:56,borderRadius:28,background:`linear-gradient(135deg,${T.primary},${T.accent})`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:28,flexShrink:0}}>{d.e}</div><div style={{flex:1}}><div style={{fontSize:14.5,fontWeight:800,color:T.text}}>{d.name}</div><div style={{fontSize:11.5,color:T.muted,marginTop:1}}>{d.role}</div><div style={{display:'flex',gap:8,marginTop:5,alignItems:'center'}}><span style={{fontSize:12,color:T.primary,fontWeight:800}}>⭐ {d.rating}</span><span style={{fontSize:10,background:d.avail?'rgba(76,175,125,0.18)':'rgba(255,255,255,0.06)',color:d.avail?T.green:T.muted,padding:'2px 8px',borderRadius:9,fontWeight:800}}>{d.avail?'Available':'Busy'}</span></div></div>{d.avail&&<div style={{color:T.muted,fontSize:20}}>›</div>}</div></Card>)}</div></div>;}

function TabBar({active,onTab}){const tabs=[{id:'journey',e:'🌸',l:'Journey'},{id:'log',e:'📋',l:'Log'},{id:'body',e:'🤰',l:'Body'},{id:'doctors',e:'🩺',l:'Doctors'}];return<div style={{display:'flex',flexShrink:0,background:T.tabBg,borderTop:`0.5px solid ${T.border}`,backdropFilter:'blur(24px)',paddingBottom:22,paddingTop:8}}>{tabs.map(tab=>{const on=tab.id===active;return<button key={tab.id} onClick={()=>onTab(tab.id)} style={{flex:1,background:'none',border:'none',cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',gap:2,padding:'4px 0'}}><span style={{fontSize:20,lineHeight:1,filter:on?'none':'grayscale(1)',opacity:on?1:0.38,transition:'all .2s'}}>{tab.e}</span><span style={{fontSize:9.5,fontWeight:800,color:on?T.primary:T.muted,fontFamily:'Nunito',letterSpacing:.4,transition:'color .2s'}}>{tab.l}</span>{on&&<div style={{width:18,height:3,borderRadius:2,background:T.primary,boxShadow:`0 0 6px ${T.primary}`}}/>}</button>;})}</div>;}

function BloomApp({week,streak,name,pathwayId,showOnboarding:initOnboard}){
  const[onboarded,setOnboarded]=React.useState(!initOnboard);
  const[appName,setAppName]=React.useState(name);
  const[appWeek,setAppWeek]=React.useState(week);
  const[appPathway,setAppPathway]=React.useState(PATHWAYS[pathwayId]||PATHWAYS.standard);
  const[tab,setTab]=React.useState('journey');

  if(!onboarded){
    return<Onboarding onComplete={({name:n,week:w,pathway:p})=>{
      setAppName(n);setAppWeek(w);
      setAppPathway(PATHWAYS[p]||PATHWAYS.standard);
      setOnboarded(true);
    }}/>;
  }

  const screens={journey:<JourneyTab week={appWeek} streak={streak} name={appName} pathway={appPathway}/>,log:<LogTab/>,body:<BodyTab week={appWeek} streak={streak}/>,doctors:<DoctorsTab/>};
  return<div style={{width:'100%',height:'100%',display:'flex',flexDirection:'column',background:T.bg,fontFamily:'Nunito,sans-serif',overflow:'hidden'}}><div key={tab} style={{flex:1,display:'flex',flexDirection:'column',minHeight:0}}>{screens[tab]}</div><TabBar active={tab} onTab={setTab}/></div>;
}

function Tweaks({vals,onChange,visible}){if(!visible)return null;return<div style={{position:'fixed',bottom:24,right:24,zIndex:9999,background:'#2a1810',borderRadius:20,boxShadow:'0 8px 40px rgba(0,0,0,0.5)',padding:'18px 20px',width:240,fontFamily:'Nunito',border:`1px solid ${T.border}`}}><div style={{fontWeight:900,fontSize:14,marginBottom:14,color:T.text}}>Tweaks</div>{[['WEEK','week',4,40,1],['STREAK','streakDays',1,30,1]].map(([l,k,mn,mx,st])=><div key={k} style={{marginBottom:14}}><div style={{fontSize:10.5,fontWeight:800,color:T.muted,letterSpacing:.9,marginBottom:6}}>{l} — {vals[k]}</div><input type="range" min={mn} max={mx} step={st} value={vals[k]} onChange={e=>onChange(k,+e.target.value)} style={{width:'100%',accentColor:T.primary}}/></div>)}<div style={{marginBottom:14}}><div style={{fontSize:10.5,fontWeight:800,color:T.muted,letterSpacing:.9,marginBottom:6}}>PATHWAY</div><div style={{display:'flex',flexDirection:'column',gap:6}}>{Object.values(PATHWAYS).map(p=><button key={p.id} onClick={()=>onChange('pathway',p.id)} style={{padding:'7px 10px',borderRadius:9,border:`1px solid ${vals.pathway===p.id?p.color:T.border}`,background:vals.pathway===p.id?`${p.color}20`:'rgba(255,255,255,0.05)',color:vals.pathway===p.id?p.color:T.muted,fontFamily:'Nunito',fontSize:12,fontWeight:700,cursor:'pointer',textAlign:'left'}}>{p.icon} {p.label}</button>)}</div></div><button onClick={()=>onChange('showOnboarding',true)} style={{width:'100%',padding:'9px',borderRadius:10,border:`1px solid ${T.border}`,background:'rgba(255,255,255,0.05)',color:T.muted,fontFamily:'Nunito',fontSize:12,fontWeight:700,cursor:'pointer'}}>↺ Restart onboarding</button></div>;}

function Stage(){
  const[vals,setVals]=React.useState(TWEAK_DEFAULTS);
  const[tweaksOn,setTweaksOn]=React.useState(false);
  const[scale,setScale]=React.useState(1);
  const[renderKey,setRenderKey]=React.useState(0);
  React.useEffect(()=>{const calc=()=>setScale(Math.min((window.innerWidth-40)/402,(window.innerHeight-40)/874,1));calc();window.addEventListener('resize',calc);return()=>window.removeEventListener('resize',calc);},[]);
  React.useEffect(()=>{const fn=e=>{if(e.data?.type==='__activate_edit_mode')setTweaksOn(true);if(e.data?.type==='__deactivate_edit_mode')setTweaksOn(false);};window.addEventListener('message',fn);window.parent.postMessage({type:'__edit_mode_available'},'*');return()=>window.removeEventListener('message',fn);},[]);
  const setVal=(k,v)=>{
    const next={...vals,[k]:v};setVals(next);
    if(k==='showOnboarding'&&v)setRenderKey(r=>r+1);
    window.parent.postMessage({type:'__edit_mode_set_keys',edits:next},'*');
  };
  return<><div style={{transform:`scale(${scale})`,transformOrigin:'center center'}}><IOSDevice dark={true} width={402} height={874}><BloomApp key={renderKey} week={vals.week} streak={vals.streakDays} name={vals.name||'Sophia'} pathwayId={vals.pathway} showOnboarding={vals.showOnboarding}/></IOSDevice></div><Tweaks vals={vals} onChange={setVal} visible={tweaksOn}/></>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<Stage/>);
</script>
