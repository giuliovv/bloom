<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bloom Bold v5</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="ios-frame.jsx"></script>
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
    html,body{height:100%;overflow:hidden;}
    body{background:radial-gradient(ellipse at 50% 60%,#2a1208,#0c0604);display:flex;align-items:center;justify-content:center;font-family:'Nunito',sans-serif;}
    ::-webkit-scrollbar{display:none;}

    /* Character walk — scaleX flip handled inline */
    @keyframes charWalk{
      0%   {transform:translateX(18px) scaleX(1);}
      49%  {transform:translateX(224px) scaleX(1);}
      50%  {transform:translateX(224px) scaleX(-1);}
      99%  {transform:translateX(18px) scaleX(-1);}
      100% {transform:translateX(18px) scaleX(1);}
    }
    @keyframes bodyBob{0%,100%{transform:translateY(0);}25%,75%{transform:translateY(-3px);}}
    @keyframes armL{0%,100%{transform:rotate(30deg);}50%{transform:rotate(-30deg);}}
    @keyframes armR{0%,100%{transform:rotate(-30deg);}50%{transform:rotate(30deg);}}
    @keyframes legL{0%,100%{transform:rotate(26deg);}50%{transform:rotate(-26deg);}}
    @keyframes legR{0%,100%{transform:rotate(-26deg);}50%{transform:rotate(26deg);}}
    @keyframes breathe{0%,100%{transform:scaleY(1);}50%{transform:scaleY(1.04);}}
    @keyframes sitBob{0%,100%{transform:translateY(0);}50%{transform:translateY(-1.5px);}}
    @keyframes steam{0%{opacity:.7;transform:translateY(0);}100%{opacity:0;transform:translateY(-18px);}}
    @keyframes zzz{0%{opacity:0;transform:translate(0,0) scale(.7);}30%{opacity:1;}100%{opacity:0;transform:translate(10px,-22px) scale(1.2);}}
    @keyframes starTwinkle{0%,100%{opacity:.45;}50%{opacity:1;}}
    @keyframes lampGlow{0%,100%{opacity:.5;}50%{opacity:.95;}}
    @keyframes firefly{0%,100%{opacity:.2;transform:translate(0,0);}25%{opacity:1;transform:translate(4px,-6px);}50%{opacity:.5;transform:translate(8px,-2px);}75%{opacity:.9;transform:translate(2px,-9px);}}
    @keyframes thoughtIn{0%{opacity:0;transform:scale(.8) translateY(4px);}100%{opacity:1;transform:scale(1) translateY(0);}}
    @keyframes thoughtOut{0%{opacity:1;}100%{opacity:0;}}
    @keyframes tapBounce{0%{transform:scale(1);}30%{transform:scale(.88) rotate(-8deg);}60%{transform:scale(1.06) rotate(2deg);}100%{transform:scale(1) rotate(0deg);}}
    @keyframes glowPulse{0%,100%{opacity:.5;}50%{opacity:1;}}
    @keyframes screenIn{from{opacity:0;transform:translateY(9px);}to{opacity:1;transform:translateY(0);}}
    @keyframes callRing{0%,100%{box-shadow:0 0 0 0 rgba(76,175,125,.45);}50%{box-shadow:0 0 0 18px rgba(76,175,125,0);}}
    @keyframes kickPop{0%{transform:scale(1);}35%{transform:scale(1.16);}65%{transform:scale(.95);}100%{transform:scale(1);}}
    @keyframes zonePulse{0%,100%{opacity:.55;transform:scale(1);}50%{opacity:1;transform:scale(1.06);}}
    @keyframes streakUnlock{0%{transform:scale(0) rotate(-20deg);opacity:0;}70%{transform:scale(1.2) rotate(4deg);}100%{transform:scale(1) rotate(0deg);opacity:1;}}
    @keyframes floatUp{0%{opacity:0;transform:translateY(0) scale(.8);}20%{opacity:1;}100%{opacity:0;transform:translateY(-30px) scale(1.1);}}

    .screen{animation:screenIn .28s cubic-bezier(.2,.8,.3,1) both;}
    .kick-pop{animation:kickPop .38s ease-out;}
    .zone-pulse{animation:zonePulse 2.8s ease-in-out infinite;transform-origin:center;}
    .char-bounce{animation:tapBounce .45s cubic-bezier(.2,1.4,.4,1) both;}
    .thought-in{animation:thoughtIn .25s ease-out both;}
    .streak-unlock{animation:streakUnlock .5s cubic-bezier(.2,1.4,.4,1) both;}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "week": 24,
  "streakDays": 12,
  "name": "Sophia",
  "loggedToday": true
}/*EDITMODE-END*/;

const T={bg:'#1a0c06',bgDeep:'#110804',card:'rgba(255,255,255,0.07)',cardGlow:'rgba(255,107,74,0.13)',primary:'#ff6b4a',accent:'#ffaa7a',green:'#4caf7d',amber:'#ffcc66',text:'#fef0e6',muted:'rgba(254,240,230,0.48)',border:'rgba(255,255,255,0.09)',tabBg:'rgba(14,7,3,0.92)'};

// ── Week data ──────────────────────────────────────────────────
const MILESTONES=[
  {w:8, e:'🫐',size:'blueberry',g:1,energy:2,charState:'resting',feel:['Morning sickness','Extreme fatigue','Tender breasts'],reassure:'Morning sickness is a sign of strong hormone levels — actually reassuring. Peaks at weeks 8–10 then fades for most mums.',scan:null},
  {w:12,e:'🍋',size:'lime',g:58,energy:3,charState:'sitting',feel:['Nausea easing','Still tired','Mood swings'],reassure:'Your body has been building the placenta from scratch. That\'s marathon-level effort. Energy returns soon.',scan:'First trimester scan'},
  {w:16,e:'🥑',size:'avocado',g:100,energy:4,charState:'walking',feel:['Energy returning','Round ligament pain','Glowing skin'],reassure:'A sharp stab when you turn quickly is round ligament pain — the ligaments supporting your uterus stretching. Completely normal, not a warning sign.',scan:null},
  {w:20,e:'🍌',size:'banana',g:300,energy:4,charState:'walking',feel:['First flutters / kicks','Heartburn starting','Good energy'],reassure:'Those first little flutters are baby moving. If you don\'t feel them yet, don\'t worry — it varies by placenta position. They\'ll come.',scan:'Anomaly scan (20 weeks)'},
  {w:24,e:'🌽',size:'ear of corn',g:600,energy:3,charState:'walking',feel:['Braxton Hicks','Round ligament pain','Heartburn after meals'],reassure:'Braxton Hicks feel like your belly tightening suddenly. They\'re painless, irregular, and stop if you change position. Your uterus is simply practising.',scan:'Glucose screening (24–28w)'},
  {w:28,e:'🍆',size:'aubergine',g:1000,energy:3,charState:'sitting',feel:['Back ache worsening','Breathlessness','Leg cramps at night'],reassure:'Breathlessness happens because baby is pressing upwards on your diaphragm. Sleep on your left side — it gives your lungs more room.',scan:'Whooping cough vaccine (27–36w)'},
  {w:32,e:'🥥',size:'coconut',g:1700,energy:2,charState:'sitting',feel:['Swollen ankles by evening','Frequent bathroom trips','Pelvic pressure'],reassure:'Swollen ankles are very common — fluid pools due to gravity and extra blood volume, not a circulation problem. Elevate feet for 20 minutes.',scan:'Growth scan (32 weeks)'},
  {w:36,e:'🍈',size:'honeydew',g:2600,energy:2,charState:'resting',feel:['Baby dropping','Pelvic heaviness','Nesting energy bursts'],reassure:'Pelvic pressure and heaviness means baby is moving down — called engagement. It means your body is preparing perfectly for birth.',scan:'Group B Strep test (36w)'},
  {w:40,e:'🍉',size:'watermelon',g:3400,energy:3,charState:'contracting',feel:['Irregular tightenings','Everything feels significant','Restlessness'],reassure:'Real contractions come in a regular pattern, build in intensity, and don\'t stop with movement. If tightenings are 5+ min apart for an hour, call your midwife.',scan:'Due date 🎉'},
];
function getMilestone(w){return MILESTONES.reduce((a,b)=>Math.abs(b.w-w)<Math.abs(a.w-w)?b:a);}
const TRIM=w=>w<=13?1:w<=26?2:3;

// Thought bubble messages
const THOUGHTS=[
  w=>`Baby can hear you right now at week ${w} 🎵`,
  ()=>'Stay hydrated today — it helps with Braxton Hicks 💧',
  ()=>'You\'re doing amazingly. Really. 🌸',
  ()=>'A short walk can ease back ache today 🚶‍♀️',
  w=>`Only ${40-w} weeks to go!`,
  ()=>'Kick counter: tap me when you feel movement 🦶',
];

// ── Primitives ─────────────────────────────────────────────────
function Card({children,style={},onClick,glow}){return<div onClick={onClick} style={{background:glow?T.cardGlow:T.card,borderRadius:20,padding:'14px 16px',border:`1px solid ${glow?'rgba(255,107,74,0.25)':T.border}`,cursor:onClick?'pointer':'default',...style}}>{children}</div>;}
function Lbl({children,style={}}){return<div style={{fontSize:10,fontWeight:800,color:T.muted,letterSpacing:1.2,textTransform:'uppercase',marginBottom:9,...style}}>{children}</div>;}
function Btn({children,onClick,color,style={}}){return<button onClick={onClick} style={{width:'100%',padding:'15px',borderRadius:16,border:'none',cursor:'pointer',background:color||T.primary,color:'#fff',fontSize:15,fontWeight:800,fontFamily:'Nunito,sans-serif',...style}}>{children}</button>;}
function StreakRing({streak,goal=14,size=56}){const r=size/2-4,c=2*Math.PI*r,pct=Math.min(streak/goal,1);return<div style={{width:size,height:size,position:'relative',flexShrink:0}}><svg width={size} height={size}><circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(255,255,255,0.1)" strokeWidth={3.5}/><circle cx={size/2} cy={size/2} r={r} fill="none" stroke={T.primary} strokeWidth={3.5} strokeDasharray={`${c*pct} ${c}`} strokeLinecap="round" transform={`rotate(-90 ${size/2} ${size/2})`} style={{filter:`drop-shadow(0 0 5px ${T.primary})`}}/></svg><div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'}}><span style={{fontSize:13,fontWeight:900,color:T.primary,lineHeight:1}}>{streak}</span><span style={{fontSize:6.5,fontWeight:800,color:T.muted,letterSpacing:.8}}>DAYS</span></div></div>;}

// ── Hero Scene SVG ─────────────────────────────────────────────
const STARS=Array.from({length:20},(_,i)=>({x:Math.sin(i*137.5)*140+181,y:Math.cos(i*89.3)*50+38,r:Math.sin(i*23)*.7+.9,d:i*.38}));

function HeroScene({ charState, streak, loggedToday, onTap, thought }) {
  const isHome = charState==='resting'||charState==='sitting'||charState==='contracting';
  const isWalk = charState==='walking';
  const skin='#f4c4a8', hair='#3d1f0e', dress=loggedToday?'#ff8c6a':'#8a6a58', shoe='#c8654a';
  const streakFireflies = streak >= 7;
  const streakGlow = streak >= 14;
  const streakGolden = streak >= 21;

  // Sky color based on streak (gets warmer/more magical)
  const skyBot = streakGolden ? '#6B3218' : '#3d1520';
  const skyTop = streakGolden ? '#1a0830' : '#120a30';

  // Arm + leg animations
  const legL={animation:'legL .58s ease-in-out infinite',transformOrigin:'-7px -30px',transformBox:'fill-box'};
  const legR={animation:'legR .58s ease-in-out infinite',transformOrigin:'7px -30px',transformBox:'fill-box'};
  const armL={animation:'armL .58s ease-in-out infinite',transformOrigin:'-14px -68px',transformBox:'fill-box'};
  const armR={animation:'armR .58s ease-in-out infinite',transformOrigin:'14px -68px',transformBox:'fill-box'};

  const WalkChar = () => (
    <g style={{animation:'bodyBob .58s ease-in-out infinite'}}>
      <ellipse cx="0" cy="4" rx="16" ry="4.5" fill="rgba(0,0,0,0.22)"/>
      {/* back leg */}
      <g style={legR}><rect x="2" y="-30" width="9" height="30" rx="4.5" fill={dress} opacity=".75"/><ellipse cx="7" cy="2" rx="7" ry="3.5" fill={shoe} opacity=".75"/></g>
      {/* body/dress */}
      <rect x="-16" y="-72" width="32" height="44" rx="10" fill={dress}/>
      {/* bump */}
      <ellipse cx="13" cy="-50" rx="17" ry="15" fill={dress}/>
      <ellipse cx="14" cy="-55" rx="8" ry="6" fill="rgba(255,255,255,0.14)"/>
      {/* back arm */}
      <g style={armR}><rect x="13" y="-70" width="9" height="24" rx="4.5" fill={skin} opacity=".78"/></g>
      {/* front leg */}
      <g style={legL}><rect x="-11" y="-30" width="9" height="30" rx="4.5" fill={dress}/><ellipse cx="-7" cy="2" rx="7" ry="3.5" fill={shoe}/></g>
      {/* front arm */}
      <g style={armL}><rect x="-22" y="-70" width="9" height="24" rx="4.5" fill={skin}/></g>
      {/* neck */}
      <rect x="-4.5" y="-77" width="9" height="8" rx="3.5" fill={skin}/>
      {/* head */}
      <circle cx="0" cy="-90" r="15" fill={skin}/>
      {/* hair */}
      <ellipse cx="-2" cy="-102" rx="15" ry="8" fill={hair}/>
      <ellipse cx="-14" cy="-95" rx="5.5" ry="9" fill={hair}/>
      <circle cx="12" cy="-102" r="6" fill={hair}/>
      {/* streak hair flower */}
      {streak>=7 && <><circle cx="14" cy="-103" r="5" fill="#ff6b4a" opacity=".9"/><circle cx="14" cy="-103" r="2.5" fill="#ffee99"/></>}
      {/* eye */}
      <circle cx="6" cy="-90" r="2.8" fill="#2d1a10"/>
      <circle cx="7.2" cy="-91.2" r="1.1" fill="white"/>
      {/* smile */}
      <path d={loggedToday?"M3,-84 Q7,-81 10,-84":"M3,-84 Q7,-85 10,-84"} stroke="#2d1a10" strokeWidth="1.4" fill="none" strokeLinecap="round"/>
      <circle cx="11" cy="-86" r="4" fill="rgba(255,150,100,0.22)"/>
      {/* thought bubble */}
      {thought && (
        <g className="thought-in" style={{pointerEvents:'none'}}>
          <ellipse cx="28" cy="-115" rx="42" ry="16" fill="rgba(255,240,230,0.95)" stroke="rgba(255,107,74,0.3)" strokeWidth="1"/>
          <circle cx="14" cy="-106" r="3" fill="rgba(255,240,230,0.95)"/>
          <circle cx="18" cy="-109" r="2" fill="rgba(255,240,230,0.95)"/>
          <text x="28" y="-113" textAnchor="middle" fontSize="7" fill="#2d1a10" fontFamily="Nunito" fontWeight="700">{thought.slice(0,28)}</text>
          {thought.length > 28 && <text x="28" y="-104" textAnchor="middle" fontSize="7" fill="#2d1a10" fontFamily="Nunito" fontWeight="600">{thought.slice(28,52)}</text>}
        </g>
      )}
      {/* missed log nudge */}
      {!loggedToday && (
        <g style={{animation:'floatUp 2s ease-out infinite'}}>
          <text x="0" y="-110" textAnchor="middle" fontSize="14" fill={T.primary} fontFamily="Nunito">?</text>
        </g>
      )}
    </g>
  );

  const SitChar = () => (
    <g style={{animation:'sitBob 3.5s ease-in-out infinite'}}>
      {/* legs bent */}
      <rect x="-18" y="-10" width="14" height="20" rx="5" fill={dress}/>
      <rect x="4" y="-10" width="14" height="20" rx="5" fill={dress}/>
      <ellipse cx="-11" cy="12" rx="9" ry="4" fill={shoe}/>
      <ellipse cx="11" cy="12" rx="9" ry="4" fill={shoe}/>
      {/* body */}
      <rect x="-17" y="-55" width="34" height="48" rx="11" fill={dress} style={{animation:'breathe 3.2s ease-in-out infinite',transformOrigin:'0 -30px',transformBox:'fill-box'}}/>
      {/* bump */}
      <ellipse cx="0" cy="-32" rx="18" ry="15" fill={dress}/>
      <ellipse cx="0" cy="-36" rx="9" ry="7" fill="rgba(255,255,255,0.14)"/>
      {/* left arm */}
      <rect x="-26" y="-50" width="10" height="20" rx="5" fill={skin}/>
      {/* right arm + mug */}
      <rect x="16" y="-50" width="10" height="20" rx="5" fill={skin}/>
      <rect x="16" y="-34" width="14" height="12" rx="4" fill="rgba(255,200,150,0.75)" stroke="rgba(255,255,255,0.2)" strokeWidth="1"/>
      <path d="M30,-31 Q35,-31 35,-27 Q35,-23 30,-23" fill="none" stroke="rgba(255,200,150,0.75)" strokeWidth="1.8" strokeLinecap="round"/>
      {[0,1].map(i=><g key={i} style={{animation:`steam ${1.8+i*.5}s ease-out infinite`,animationDelay:`${i*.6}s`}}><path d={`M${20+i*4},-36 Q${22+i*4},-43 ${20+i*4},-49`} fill="none" stroke="rgba(255,220,180,0.5)" strokeWidth="1.3" strokeLinecap="round"/></g>)}
      {/* neck/head */}
      <rect x="-4" y="-62" width="8" height="9" rx="3.5" fill={skin}/>
      <circle cx="0" cy="-74" r="14" fill={skin}/>
      <ellipse cx="0" cy="-85" rx="15" ry="7.5" fill={hair}/>
      <ellipse cx="-13" cy="-80" rx="5" ry="8" fill={hair}/>
      <circle cx="12" cy="-85" r="6" fill={hair}/>
      {streak>=7 && <><circle cx="13" cy="-86" r="5" fill="#ff6b4a" opacity=".9"/><circle cx="13" cy="-86" r="2.5" fill="#ffee99"/></>}
      {charState==='resting'
        ? <><ellipse cx="-5" cy="-74" rx="3.5" ry="1.3" fill="#2d1a10"/><ellipse cx="5" cy="-74" rx="3.5" ry="1.3" fill="#2d1a10"/></>
        : <><circle cx="-5" cy="-74" r="2.8" fill="#2d1a10"/><circle cx="5" cy="-74" r="2.8" fill="#2d1a10"/></>
      }
      <path d={loggedToday?"M-4,-68 Q0,-65 4,-68":"M-4,-68 L4,-68"} stroke="#2d1a10" strokeWidth="1.4" fill="none" strokeLinecap="round"/>
      {charState==='resting' && [0,1,2].map(i=><text key={i} x={18+i*7} y={-76-i*6} fontSize={6+i*2} fill="rgba(254,240,230,0.45)" fontFamily="Nunito" style={{animation:`zzz ${1.5+i*.4}s ease-out infinite`,animationDelay:`${i*.5}s`}}>z</text>)}
      {thought && (
        <g className="thought-in">
          <ellipse cx="0" cy="-96" rx="44" ry="15" fill="rgba(255,240,230,0.95)" stroke="rgba(255,107,74,0.3)" strokeWidth="1"/>
          <circle cx="0" cy="-88" r="3" fill="rgba(255,240,230,0.95)"/>
          <text x="0" y="-94" textAnchor="middle" fontSize="7" fill="#2d1a10" fontFamily="Nunito" fontWeight="700">{thought.slice(0,26)}</text>
        </g>
      )}
    </g>
  );

  if (isHome) {
    return (
      <svg viewBox="0 0 362 255" width="100%" height="255" style={{display:'block'}} onClick={onTap}>
        <defs>
          <linearGradient id="hw2" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={streakGolden?"#3d1a10":"#2a1a10"}/><stop offset="100%" stopColor={streakGolden?"#5a2810":"#3d2416"}/></linearGradient>
          <linearGradient id="hf2" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#4a2e1a"/><stop offset="100%" stopColor="#3a2210"/></linearGradient>
          <radialGradient id="hl2" cx="50%" cy="30%" r="70%"><stop offset="0%" stopColor={streakGolden?"#ffcc66":"#ffcc66"} stopOpacity=".45"/><stop offset="100%" stopColor="transparent"/></radialGradient>
        </defs>
        <rect width="362" height="255" fill="url(#hw2)"/>
        {streakGolden && <rect width="362" height="255" fill="rgba(255,160,60,0.06)"/>}
        <rect y="192" width="362" height="63" fill="url(#hf2)"/>
        {[0,1,2].map(i=><rect key={i} x="0" y={198+i*8} width="362" height=".8" fill="rgba(0,0,0,0.12)"/>)}
        <ellipse cx="160" cy="220" rx="110" ry="14" fill="rgba(150,65,35,0.2)"/>
        {/* Window */}
        <rect x="14" y="28" width="56" height="72" rx="4" fill="#0c1824" stroke="#5a3a20" strokeWidth="2.5"/>
        <rect x="39" y="28" width="2" height="72" fill="#5a3a20"/>
        <rect x="14" y="63" width="56" height="2" fill="#5a3a20"/>
        <circle cx="28" cy="46" r="11" fill="#ffe8b0" opacity={streakGolden?.65:.42}/>
        <circle cx="33" cy="41" r="8.5" fill="#0c1824"/>
        {/* Lamp */}
        <rect x="302" y="102" width="5" height="92" rx="2.5" fill="#5a3a1a"/>
        <ellipse cx="305" cy="100" rx="16" ry="9" fill="#7a5a2a"/>
        <ellipse cx="305" cy="100" rx="28" ry="34" fill="url(#hl2)" style={{animation:'lampGlow 4s ease-in-out infinite'}}/>
        <circle cx="305" cy="100" r="5" fill="#ffee99"/>
        {/* Plant */}
        <rect x="334" y="168" width="10" height="26" rx="3" fill="#5a3a1a"/>
        <rect x="326" y="157" width="28" height="14" rx="6" fill="#4a3010" opacity=".7"/>
        <ellipse cx="340" cy="155" rx="9" ry="16" fill="#2d5a1a"/>
        <ellipse cx="348" cy="152" rx="7" ry="12" fill="#3d7a22"/>
        <ellipse cx="333" cy="151" rx="7" ry="11" fill="#255a18"/>
        {/* Sofa */}
        <rect x="72" y="184" width="210" height="26" rx="13" fill="#5a2a1a"/>
        <rect x="64" y="168" width="226" height="22" rx="11" fill="#6a3420"/>
        <rect x="64" y="168" width="18" height="42" rx="9" fill="#5a2a1a"/>
        <rect x="272" y="168" width="18" height="42" rx="9" fill="#5a2a1a"/>
        <rect x="142" y="164" width="70" height="20" rx="9" fill="#7a3a22"/>
        {/* Character on sofa */}
        <g transform="translate(175,188)">
          <SitChar/>
        </g>
        {/* Streak golden particles */}
        {streakGolden && [30,80,130,200,250,310].map(x=>(
          <circle key={x} cx={x} cy={150+Math.sin(x)*20} r="2" fill={T.amber} opacity=".6"
            style={{animation:`floatUp ${2+Math.sin(x)*.8}s ease-out infinite`,animationDelay:`${x*.01}s`}}/>
        ))}
      </svg>
    );
  }

  // Park scene
  return (
    <svg viewBox="0 0 362 255" width="100%" height="255" style={{display:'block',cursor:'pointer'}} onClick={onTap}>
      <defs>
        <linearGradient id="ps2" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={skyTop}/>

      {/* Horizon */}
      <ellipse cx="181" cy="175" rx="230" ry="38" fill="rgba(200,80,30,0.16)"/>
      {/* Hill */}
      <path d="M0,165 Q90,130 181,148 Q272,166 362,145 L362,255 L0,255Z" fill="#1a2d10"/>

      {/* Flowers — more with higher streak */}
      {[48,76,112,148,198,228].slice(0,streak>=3?6:2).map(x=>(

      {/* Fireflies (streak >= 7) */}

      ))}

        <g opacity=".25">

          <WalkChar/>

      {!loggedToday && (
        <rect width="362" height="255" fill="rgba(0,0,0,0.28)"/>

}

// ── JOURNEY TAB ────────────────────────────────────────────────
function JourneyTab({ week, streak, name, loggedToday }) {
  const m = getMilestone(week);
  const [bouncing, setBouncing] = React.useState(false);
  const [thought, setThought] = React.useState(null);
  const [thoughtTimer, setThoughtTimer] = React.useState(null);
  const [mood, setMood] = React.useState('happy');
  const [kicks, setKicks] = React.useState(0);
  const [kickAnim, setKickAnim] = React.useState(false);
  const [energy, setEnergy] = React.useState(m.energy);
  const [expandedWeek, setExpandedWeek] = React.useState(null);

  // Derive character state from mood + energy
  const charState = React.useMemo(() => {
    if (!loggedToday) return 'sitting';
    if (mood==='tired'||energy<=1) return 'resting';
    if (energy<=2||mood==='tired') return 'sitting';
    if (mood==='anxious') return 'sitting';
    if (energy>=4&&(mood==='happy'||mood==='calm')) return m.charState;
    return 'sitting';
  }, [mood, energy, loggedToday, m.charState]);

  const handleTap = () => {
    if (bouncing) return;
    setBouncing(true);
    if (thoughtTimer) clearTimeout(thoughtTimer);
    const msg = THOUGHTS[Math.floor(Math.random()*THOUGHTS.length)](week);
    setThought(msg);
    const t = setTimeout(()=>setThought(null), 3200);
    setThoughtTimer(t);
    setTimeout(()=>setBouncing(false), 500);
  };

  const addKick = () => {
    setKicks(k=>k+1);
    setKickAnim(true);
    setTimeout(()=>setKickAnim(false), 400);
  };

  const energyColor = e => e>=4?T.green:e>=3?T.accent:T.primary;
  const moodOpts = [{id:'happy',e:'😊',l:'Great'},{id:'calm',e:'😌',l:'Calm'},{id:'tired',e:'😴',l:'Tired'},{id:'anxious',e:'😟',l:'Worried'}];

  // Tomorrow and upcoming from milestones
  const futureMilestones = MILESTONES.filter(mi=>mi.w>week);
  const nextMilestone = futureMilestones[0];
  const nextScan = futureMilestones.find(mi=>mi.scan);

  return (
    <div className="screen" style={{flex:1,overflowY:'auto',background:T.bg,display:'flex',flexDirection:'column'}}>
      <div style={{height:58}}/>

      {/* Compact header */}
      <div style={{padding:'0 20px 10px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <div>
          <div style={{fontSize:10,fontWeight:800,color:T.muted,letterSpacing:1.2,textTransform:'uppercase'}}>Week {week} · Trimester {TRIM(week)}</div>
          <div style={{fontSize:19,fontWeight:900,color:T.text,marginTop:1}}>{name} 🌸</div>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          {!loggedToday && (
            <div style={{fontSize:10,fontWeight:800,color:T.primary,background:'rgba(255,107,74,0.15)',
              padding:'4px 10px',borderRadius:10,border:`1px solid rgba(255,107,74,0.3)`}}>
              Log today →
            </div>
          )}
          <StreakRing streak={streak}/>
        </div>
      </div>

      {/* HERO SCENE — tap to interact */}
      <div style={{margin:'0 14px',borderRadius:18,overflow:'hidden',height:255,
        boxShadow:'0 8px 40px rgba(0,0,0,0.55), 0 0 0 1px rgba(255,255,255,0.06)',
        position:'relative',flexShrink:0,
        transform:bouncing?'scale(0.97)':'scale(1)',transition:'transform 0.18s',
      }}>
        <HeroScene charState={charState} streak={streak} loggedToday={loggedToday} onTap={handleTap} thought={thought}/>

        {/* Streak badge overlay */}
        {streak>=7 && (
          <div style={{position:'absolute',top:10,left:10,
            background:'rgba(14,7,3,0.75)',borderRadius:10,padding:'4px 10px',
            backdropFilter:'blur(8px)',border:`1px solid ${T.border}`,
            display:'flex',alignItems:'center',gap:5}}>
            <span style={{fontSize:12}}>🔥</span>
            <span style={{fontSize:10,fontWeight:800,color:T.accent}}>{streak}-day streak</span>
          </div>
        )}

        {/* Tap hint */}
        <div style={{position:'absolute',bottom:10,right:12,
          fontSize:9,fontWeight:800,color:'rgba(254,240,230,0.4)',letterSpacing:.6}}>
          TAP TO INTERACT
        </div>
      </div>

      {/* Character caption */}
      <div style={{margin:'10px 14px 0',padding:'9px 14px',
        background:'rgba(255,255,255,0.05)',borderRadius:12,
        border:`1px solid ${T.border}`,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <div style={{fontSize:12.5,color:T.text,fontWeight:600}}>
          {!loggedToday ? `${name} is waiting to hear from you... 💭` :
            {walking:`${name} is on her evening walk 🌙`,sitting:`${name} is resting with tea 🍵`,resting:`${name} is taking it easy 💤`,contracting:`${name} is having Braxton Hicks — just practice 💨`}[charState]}
        </div>
        <div style={{fontSize:11,color:T.muted,fontWeight:700,flexShrink:0,marginLeft:8}}>
          {m.e} {m.size}
        </div>
      </div>

      {/* Streak milestones */}
      {(() => {
        const badges=[{days:3,e:'🌱',l:'3 days'},{days:7,e:'🌸',l:'1 week'},{days:14,e:'🔥',l:'2 weeks'},{days:21,e:'✨',l:'3 weeks'},{days:30,e:'🏅',l:'1 month'}];
        const next = badges.find(b=>streak<b.days);
        const earned = badges.filter(b=>streak>=b.days);
        if (!next && !earned.length) return null;
        return (
          <div style={{margin:'10px 14px 0',display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
            {earned.map((b,i)=>(
              <div key={i} style={{display:'flex',alignItems:'center',gap:5,
                background:'rgba(255,107,74,0.15)',borderRadius:10,padding:'4px 10px',
                border:`1px solid rgba(255,107,74,0.28)`}}>
                <span style={{fontSize:14}}>{b.e}</span>
                <span style={{fontSize:10,fontWeight:800,color:T.primary}}>{b.l}</span>
              </div>
            ))}
            {next && (
              <div style={{display:'flex',alignItems:'center',gap:5,
                background:'rgba(255,255,255,0.05)',borderRadius:10,padding:'4px 10px',
                border:`1px solid ${T.border}`}}>
                <span style={{fontSize:14,filter:'grayscale(1)',opacity:.5}}>{next.e}</span>
                <span style={{fontSize:10,fontWeight:700,color:T.muted}}>{next.days-streak}d to {next.l}</span>
              </div>
            )}
          </div>
        );
      })()}

      {/* ── TODAY CARD (daily ritual / tamagotchi loop) ── */}
      <div style={{margin:'12px 14px 0'}}>
        <Card glow>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
            <Lbl style={{marginBottom:0}}>How are you feeling today?</Lbl>
            <span style={{fontSize:10,color:T.muted,fontWeight:700}}>Updates {name.split(' ')[0]}</span>
          </div>
          {/* Mood */}
          <div style={{display:'flex',gap:7,marginBottom:12}}>
            {moodOpts.map(mo=>{const on=mood===mo.id;return(
              <button key={mo.id} onClick={()=>setMood(mo.id)} style={{
                flex:1,border:`1.5px solid ${on?T.primary:'transparent'}`,borderRadius:13,padding:'9px 0',cursor:'pointer',
                background:on?'rgba(255,107,74,0.2)':'rgba(255,255,255,0.05)',
                display:'flex',flexDirection:'column',alignItems:'center',gap:3,
                transition:'all .16s',transform:on?'scale(1.06)':'scale(1)',
              }}>
                <span style={{fontSize:19}}>{mo.e}</span>
                <span style={{fontSize:8.5,fontWeight:800,color:on?T.primary:T.muted,fontFamily:'Nunito'}}>{mo.l}</span>
              </button>
            );})}
          </div>
          {/* Energy */}
          <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:12}}>
            <span style={{fontSize:10,fontWeight:800,color:T.muted,letterSpacing:.8,minWidth:54}}>ENERGY</span>
            <div style={{flex:1,display:'flex',gap:5}}>
              {[1,2,3,4,5].map(n=>(
                <button key={n} onClick={()=>setEnergy(n)} style={{
                  flex:1,height:18,borderRadius:4,border:'none',cursor:'pointer',
                  background:n<=energy?energyColor(energy):'rgba(255,255,255,0.08)',
                  boxShadow:n<=energy&&n===energy?`0 0 6px ${energyColor(energy)}`:'none',
                  transition:'all .15s',
                }}/>
              ))}
            </div>
            <span style={{fontSize:10,fontWeight:800,color:energyColor(energy),minWidth:34,textAlign:'right'}}>
              {['','Low','Low','Okay','Good','Great'][energy]}
            </span>
          </div>
          {/* Kick counter */}
          <button onClick={addKick} className={kickAnim?'kick-pop':''} style={{
            width:'100%',background:'rgba(255,255,255,0.05)',border:`1px solid ${T.border}`,borderRadius:14,
            cursor:'pointer',padding:'10px 14px',display:'flex',alignItems:'center',gap:12,
          }}>
            <span style={{fontSize:24}}>🦶</span>
            <div style={{flex:1,textAlign:'left'}}>
              <div style={{fontSize:12.5,fontWeight:800,color:T.text}}>Count kicks</div>
              <div style={{fontSize:10.5,color:T.muted}}>Tap each time you feel movement</div>
            </div>
            <div style={{textAlign:'right'}}>
              <div style={{fontSize:24,fontWeight:900,color:T.primary,lineHeight:1}}>{kicks}</div>
              <div style={{fontSize:9,color:T.muted,fontWeight:700}}>today</div>
            </div>
          </button>
        </Card>
      </div>

      {/* ── TODAY'S SYMPTOMS (from current milestone) ── */}
      <div style={{margin:'10px 14px 0'}}>
        <Card>
          <Lbl>What you might feel today</Lbl>
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            {m.feel.map((f,i)=>(
              <div key={i} style={{display:'flex',alignItems:'center',gap:10}}>
                <div style={{width:8,height:8,borderRadius:4,background:T.primary,opacity:1-i*.25,flexShrink:0}}/>
                <span style={{fontSize:13.5,fontWeight:700,color:T.text}}>{f}</span>
              </div>
            ))}
          </div>
          {/* Reassurance */}
          <div style={{marginTop:12,background:'rgba(255,255,255,0.05)',borderRadius:10,padding:'10px 12px',
            border:`0.5px solid rgba(255,107,74,0.2)`}}>
            <div style={{fontSize:9.5,fontWeight:800,color:T.primary,letterSpacing:.8,marginBottom:5}}>
              💡 WHEN YOU FEEL THIS — DON'T WORRY
            </div>
            <div style={{fontSize:12,color:T.text,lineHeight:1.6}}>{m.reassure}</div>
          </div>
        </Card>
      </div>

      {/* ── UPCOMING MILESTONE ── */}
      {nextMilestone && (
        <div style={{margin:'10px 14px 0'}}>
          <Card>
            <Lbl>Coming up — Week {nextMilestone.w}</Lbl>
            <div style={{display:'flex',alignItems:'center',gap:12}}>
              <div style={{width:48,height:48,borderRadius:14,background:'rgba(255,107,74,0.15)',
                display:'flex',alignItems:'center',justifyContent:'center',fontSize:24,flexShrink:0}}>
                {nextMilestone.e}
              </div>
              <div style={{flex:1}}>
                <div style={{fontSize:13.5,fontWeight:800,color:T.text}}>Size of a {nextMilestone.size}</div>
                <div style={{fontSize:11.5,color:T.muted,marginTop:2}}>{nextMilestone.feel[0]} · {nextMilestone.feel[1]}</div>
              </div>
              <div style={{fontSize:13,fontWeight:800,color:T.primary,flexShrink:0}}>
                {nextMilestone.w-week}w →
              </div>
            </div>
          </Card>
        </div>
      )}

      {/* ── NEXT SCAN / MEDICAL MILESTONE ── */}
      {nextScan && (
        <div style={{margin:'10px 14px 0'}}>
          <Card glow style={{padding:'12px 16px'}}>
            <div style={{display:'flex',alignItems:'center',gap:12}}>
              <div style={{width:36,height:36,borderRadius:11,background:'rgba(255,107,74,0.2)',
                display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,flexShrink:0}}>📅</div>
              <div style={{flex:1}}>
                <div style={{fontSize:10,fontWeight:800,color:T.primary,letterSpacing:.8,marginBottom:3}}>NEXT APPOINTMENT</div>
                <div style={{fontSize:13.5,fontWeight:800,color:T.text}}>{nextScan.scan}</div>
                <div style={{fontSize:11.5,color:T.muted,marginTop:1}}>Week {nextScan.w} · in {nextScan.w-week} weeks</div>
              </div>
            </div>
          </Card>
        </div>
      )}

      {/* ── WEEK TIMELINE (collapsed, scrollable) ── */}
      <div style={{margin:'12px 14px 4px'}}>
        <div style={{fontSize:10,fontWeight:800,color:T.muted,letterSpacing:1.1,textTransform:'uppercase',marginBottom:10}}>
          Full journey
        </div>
        <div style={{position:'relative'}}>
          <div style={{position:'absolute',left:17,top:18,bottom:18,width:2,background:'rgba(255,255,255,0.06)',borderRadius:1}}/>
          <div style={{display:'flex',flexDirection:'column',gap:10}}>
            {MILESTONES.map(mi=>{
              const isPast=mi.w<week,isCurr=mi.w===m.w,isExp=expandedWeek===mi.w;
              return(
                <div key={mi.w} style={{display:'flex',gap:11,alignItems:'flex-start'}}
                  onClick={()=>setExpandedWeek(isExp?null:mi.w)}>
                  <div style={{width:36,height:36,borderRadius:18,flexShrink:0,zIndex:1,
                    background:isPast?T.primary:isCurr?'rgba(255,107,74,0.25)':'rgba(255,255,255,0.06)',
                    border:isCurr?`2px solid ${T.primary}`:'none',
                    display:'flex',alignItems:'center',justifyContent:'center',fontSize:isPast?13:17,
                    boxShadow:isCurr?`0 0 0 4px rgba(255,107,74,0.2)`:'none',
                  }}>
                    {isPast?'✓':mi.e}
                  </div>
                  <div style={{flex:1,background:isCurr?T.cardGlow:isPast?'rgba(255,255,255,0.03)':T.card,
                    borderRadius:14,padding:'10px 13px',opacity:isPast?.6:1,
                    border:`1px solid ${isCurr?'rgba(255,107,74,0.35)':T.border}`,cursor:'pointer',
                  }}>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                      <div style={{fontSize:10,fontWeight:800,color:isCurr?T.primary:T.muted,letterSpacing:.8}}>
                        WEEK {mi.w}{isCurr?' · NOW':''}
                      </div>
                      {!isPast && !isCurr && <span style={{fontSize:10,color:T.muted}}>in {mi.w-week}w</span>}
                    </div>
                    <div style={{fontSize:13,fontWeight:800,color:T.text,marginTop:2}}>{mi.feel[0]}, {mi.feel[1]}</div>
                    {(isExp||isCurr) && (
                      <div style={{marginTop:8,fontSize:11.5,color:T.muted,lineHeight:1.55}}>{mi.reassure}</div>
                    )}
                    {mi.scan && (isExp||isCurr) && (
                      <div style={{marginTop:6,fontSize:11,color:T.accent,fontWeight:700}}>📅 {mi.scan}</div>
                    )}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      </div>

      <div style={{height:24}}/>
    </div>
  );
}

const WKDATA={8:{e:'🫐',feel:[{i:'🤢',l:'Morning sickness',z:'chest',tip:'Try ginger tea'},{i:'😴',l:'Fatigue',z:'head',tip:'Rest is productive'},{i:'💛',l:'Tender breasts',z:'chest',tip:'Supportive bra helps'}],energy:2,fact:'Baby\'s heart beats 160× a minute.'},12:{e:'🍋',feel:[{i:'🌤',l:'Nausea easing',z:'chest',tip:'Keep eating little and often'},{i:'😴',l:'Tiredness',z:'head',tip:'Energy picks up soon'},{i:'💭',l:'Mood swings',z:'head',tip:'Progesterone levelling out'}],energy:3,fact:'All major organs formed. Baby can yawn and hiccup.'},16:{e:'🥑',feel:[{i:'⚡',l:'Energy returning',z:'head',tip:'The golden trimester!'},{i:'🫀',l:'Round lig. pain',z:'pelvis',tip:'Move slowly when changing position'},{i:'😊',l:'Glowing skin',z:'head',tip:'Increased blood flow'}],energy:4,fact:'Baby can hear. Your voice is their favourite.'},20:{e:'🍌',feel:[{i:'🦋',l:'Baby flutters',z:'belly',tip:'Note when you first feel movement'},{i:'🔥',l:'Heartburn',z:'chest',tip:'Sit upright 30min after meals'},{i:'⚡',l:'Good energy',z:'head',tip:'Great for gentle exercise'}],energy:4,fact:'Halfway there!'},24:{e:'🌽',feel:[{i:'💨',l:'Braxton Hicks',z:'belly',tip:'Stay hydrated'},{i:'🫀',l:'Round lig. pain',z:'pelvis',tip:'Move slowly when standing'},{i:'🔥',l:'Heartburn',z:'chest',tip:'Smaller meals help'}],energy:3,fact:'Baby can hear your voice clearly. Try singing!'},28:{e:'🍆',feel:[{i:'🛌',l:'Back ache',z:'back',tip:'Pregnancy pillow helps'},{i:'😤',l:'Breathlessness',z:'chest',tip:'Sleep on left side'},{i:'🦵',l:'Leg cramps',z:'legs',tip:'Stretch calves before bed'}],energy:3,fact:'Baby opens their eyes this week!'},32:{e:'🥥',feel:[{i:'🌊',l:'Swollen ankles',z:'legs',tip:'Elevate feet 15min'},{i:'🚽',l:'Frequent wees',z:'pelvis',tip:'Stay hydrated anyway'},{i:'😤',l:'Breathlessness',z:'chest',tip:'Sleep propped up'}],energy:2,fact:'Baby gaining ~200g/week.'},36:{e:'🍈',feel:[{i:'⬇️',l:'Baby dropping',z:'pelvis',tip:'Breathing gets easier'},{i:'😰',l:'Pelvic pressure',z:'pelvis',tip:'Warm baths help'},{i:'🌊',l:'   React.useEffect(()=>{const fn=e=>{if(e.data?.type==='__activate_edit_mode')setTweaksOn(true);if(e.data?.type==='__deactivate_edit_mode')setTweaksOn(false);};window.addEventListener('message',fn);window.parent.postMessage({type:'__edit_mode_available'},'*');return()=>window.removeEventListener('message',fn);},[]);
  const setVal=(k,v)=>{const next={...vals,[k]:v};setVals(next);window.parent.postMessage({type:'__edit_mode_set_keys',edits:next},'*');};
  return<><div style={{transform:`scale(${scale})`,transformOrigin:'center center'}}><IOSDevice dark={true} width={402} height={874}><BloomApp week={vals.week} streak={vals.streakDays} name={vals.name||'Sophia'} loggedToday={vals.loggedToday}/></IOSDevice></div><Tweaks vals={vals} onChange={setVal} visible={tweaksOn}/></>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<Stage/>);
</script>
