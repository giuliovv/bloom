<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bloom Bold</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="ios-frame.jsx"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    body {
      background: radial-gradient(ellipse at 50% 60%, #2a1208 0%, #0c0604 70%);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Nunito', sans-serif;
    }
    ::-webkit-scrollbar { display: none; }

    @keyframes blobMorph {
      0%,100% { border-radius: 62% 38% 46% 54% / 60% 44% 56% 40%; }
      20%      { border-radius: 44% 56% 38% 62% / 54% 38% 62% 46%; }
      40%      { border-radius: 56% 44% 62% 38% / 38% 62% 38% 62%; }
      60%      { border-radius: 38% 62% 54% 46% / 62% 46% 54% 38%; }
      80%      { border-radius: 54% 46% 44% 56% / 44% 56% 44% 56%; }
    }
    @keyframes blobFloat {
      0%,100% { transform: translateY(0) rotate(0deg); }
      33%      { transform: translateY(-11px) rotate(1.8deg); }
      66%      { transform: translateY(-5px) rotate(-1.2deg); }
    }
    @keyframes blink {
      0%,86%,100% { transform: scaleY(1); }
      90%          { transform: scaleY(0.06); }
    }
    @keyframes screenIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes kickPop {
      0%   { transform: scale(1); }
      30%  { transform: scale(1.14); }
      60%  { transform: scale(0.96); }
      100% { transform: scale(1); }
    }
    @keyframes callRing {
      0%,100% { box-shadow: 0 0 0 0 rgba(76,175,125,0.5); }
      50%      { box-shadow: 0 0 0 16px rgba(76,175,125,0); }
    }
    @keyframes glowPulse {
      0%,100% { opacity: 0.6; }
      50%      { opacity: 1; }
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .screen     { animation: screenIn 0.28s cubic-bezier(0.2,0.8,0.3,1) both; }
    .blob-body  { animation: blobMorph 10s ease-in-out infinite; }
    .blob-float { animation: blobFloat 5.5s ease-in-out infinite; }
    .eye        { animation: blink 5s ease-in-out infinite; transform-origin: center; }
    .eye-r      { animation-delay: 0.14s; }
    .kick-pop   { animation: kickPop 0.35s ease-out; }
    .glow-pulse { animation: glowPulse 3s ease-in-out infinite; }
    .slide-up   { animation: slideUp 0.3s ease-out both; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "week": 24,
  "streakDays": 12,
  "name": "Sophia"
}/*EDITMODE-END*/;

// ── Theme ──────────────────────────────────────────────────────────────────
const T = {
  bg:      '#1a0c06',
  bgDeep:  '#110804',
  card:    'rgba(255,255,255,0.07)',
  cardGlow:'rgba(255,107,74,0.13)',
  primary: '#ff6b4a',
  accent:  '#ffaa7a',
  green:   '#4caf7d',
  text:    '#fef0e6',
  muted:   'rgba(254,240,230,0.48)',
  border:  'rgba(255,255,255,0.09)',
  blobA:   '#ff9a70', blobB: '#ff3d1a', blobC: '#ffd4aa',
  tabBg:   'rgba(14,7,3,0.92)',
};

// ── Baby data by week ───────────────────────────────────────────────────────
const WEEKS = {
  8:  { e:'🫐', size:'blueberry',  cm:1.6,  g:1,    tri:1, feel:[{i:'🤢',l:'Morning sickness',n:'Peaks around now — try ginger'},{i:'😴',l:'Extreme fatigue',n:'Rest when you can'},{i:'💛',l:'Tender breasts',n:'Try a supportive bra'}], energy:2, fact:'Baby\'s heart beats 160× a minute — twice as fast as yours.' },
  12: { e:'🍋', size:'lime',        cm:5.4,  g:58,   tri:1, feel:[{i:'🥲',l:'Nausea easing',n:'Relief is coming soon!'},{i:'😴',l:'Still tired',n:'Energy will pick up soon'},{i:'💭',l:'Mood swings',n:'Completely normal — be kind to yourself'}], energy:3, fact:'All major organs are formed. Baby can yawn, stretch and hiccup.' },
  16: { e:'🥑', size:'avocado',    cm:11.6, g:100,  tri:2, feel:[{i:'⚡',l:'Energy returning',n:'The golden trimester is here!'},{i:'🤸',l:'Round ligament pain',n:'Sharp twinges when moving fast'},{i:'😊',l:'Glowing skin',n:'Increased blood flow — enjoy it'}], energy:4, fact:'Baby can hear sounds outside the womb. Your voice is their favourite.' },
  20: { e:'🍌', size:'banana',     cm:25,   g:300,  tri:2, feel:[{i:'🦋',l:'Baby flutters',n:'You may feel first kicks soon'},{i:'🔥',l:'Heartburn starting',n:'Try sitting upright after meals'},{i:'⚡',l:'Good energy levels',n:'Make the most of this phase'}], energy:4, fact:'Baby\'s gender may have been visible at your scan. Halfway there!' },
  24: { e:'🌽', size:'ear of corn',cm:30,   g:600,  tri:2, feel:[{i:'💨',l:'Braxton Hicks',n:'Warm-up contractions — normal'},{i:'🫀',l:'Round ligament pain',n:'Sharp when changing position'},{i:'🔥',l:'Heartburn after meals',n:'Smaller portions help'}], energy:3, fact:'Baby can hear your voice clearly. Try singing — they already know it.' },
  28: { e:'🍆', size:'aubergine',  cm:37,   g:1000, tri:3, feel:[{i:'🛌',l:'Back ache worsening',n:'A pregnancy pillow helps a lot'},{i:'😤',l:'Shortness of breath',n:'Baby is pushing up on your lungs'},{i:'🦵',l:'Leg cramps at night',n:'Stay hydrated and stretch calves'}], energy:3, fact:'Baby opens their eyes for the first time this week!' },
  32: { e:'🥥', size:'coconut',    cm:42,   g:1700, tri:3, feel:[{i:'🌊',l:'Swollen ankles',n:'Elevate feet when resting'},{i:'🚽',l:'Frequent bathroom trips',n:'Baby pressing on bladder'},{i:'😤',l:'Breathlessness',n:'Try sleeping propped up'}], energy:2, fact:'Baby is putting on about 200g a week now — mainly fat and muscle.' },
  36: { e:'🍈', size:'honeydew',   cm:47,   g:2600, tri:3, feel:[{i:'⬇️',l:'Baby dropping',n:'Called engagement — breathing easier'},{i:'😰',l:'Pelvic pressure',n:'Normal as baby moves down'},{i:'🌊',l:'Increased discharge',n:'Your body preparing for birth'}], energy:2, fact:'Baby is almost ready. They practice breathing movements every day.' },
  40: { e:'🍉', size:'watermelon', cm:51,   g:3400, tri:3, feel:[{i:'⚡',l:'Nesting instinct',n:'Bursts of energy to prepare'},{i:'😰',l:'Pelvic discomfort',n:'Baby is very low now'},{i:'🤰',l:'Restlessness',n:'Nearly time — you\'ve got this'}], energy:2, fact:'Full term! Your baby is ready to meet you. Every hour counts now.' },
};

function getWeekData(week) {
  const keys = Object.keys(WEEKS).map(Number).sort((a,b)=>a-b);
  const closest = keys.reduce((a,b) => Math.abs(b-week) < Math.abs(a-week) ? b : a);
  return WEEKS[closest];
}

const TRIMESTER = w => w <= 13 ? 1 : w <= 26 ? 2 : 3;

// ── Shared components ───────────────────────────────────────────────────────
function Card({ children, style = {}, onClick, glow }) {
  return (
    <div onClick={onClick} style={{
      background: glow ? T.cardGlow : T.card,
      borderRadius: 20, padding: '14px 16px',
      border: `1px solid ${glow ? 'rgba(255,107,74,0.25)' : T.border}`,
      cursor: onClick ? 'pointer' : 'default',
      ...style,
    }}>{children}</div>
  );
}

function Lbl({ children }) {
  return <div style={{ fontSize: 10, fontWeight: 800, color: T.muted, letterSpacing: 1.2, textTransform: 'uppercase', marginBottom: 10 }}>{children}</div>;
}

function PrimaryBtn({ children, onClick, color, style = {} }) {
  return (
    <button onClick={onClick} style={{
      width: '100%', padding: '15px', borderRadius: 16, border: 'none', cursor: 'pointer',
      background: color || T.primary, color: '#fff', fontSize: 15, fontWeight: 800,
      fontFamily: 'Nunito, sans-serif', letterSpacing: 0.2, transition: 'opacity 0.15s',
      ...style,
    }} onMouseDown={e => e.currentTarget.style.opacity='0.85'} onMouseUp={e => e.currentTarget.style.opacity='1'}>
      {children}
    </button>
  );
}

// ── Blob character ──────────────────────────────────────────────────────────
function Blob({ mood = 'happy', size = 174, onClick }) {
  const [bouncing, setBouncing] = React.useState(false);
  const tap = () => { setBouncing(true); setTimeout(()=>setBouncing(false),420); onClick?.(); };

  const faces = {
    happy:  { ry: 5.5, pupils: true, mouth: 'wide',   cheeks: true  },
    calm:   { ry: 4.2, pupils: true, mouth: 'gentle', cheeks: true  },
    tired:  { ry: 3,   pupils: true, mouth: 'small',  cheeks: false },
    anxious:{ ry: 7,   pupils: true, mouth: 'flat',   cheeks: false },
  };
  const f = faces[mood] || faces.happy;
  const cx = size/2, ey = size*0.40, es = size*0.148, my = size*0.59;

  const Mouth = () => ({
    wide:   <path d={`M${cx-25},${my} Q${cx},${my+24} ${cx+25},${my}`} stroke="#fff" strokeWidth="3.5" fill="none" strokeLinecap="round"/>,
    gentle: <path d={`M${cx-17},${my} Q${cx},${my+14} ${cx+17},${my}`} stroke="#fff" strokeWidth="3" fill="none" strokeLinecap="round"/>,
    small:  <path d={`M${cx-11},${my} Q${cx},${my+8} ${cx+11},${my}`} stroke="#fff" strokeWidth="2.8" fill="none" strokeLinecap="round" opacity=".75"/>,
    flat:   <path d={`M${cx-14},${my+3} L${cx+14},${my+3}`} stroke="#fff" strokeWidth="2.8" strokeLinecap="round" opacity=".7"/>,
  }[f.mouth]);

  return (
    <div className="blob-float" onClick={tap} style={{ width: size, height: size, cursor: 'pointer', position: 'relative',
      transition: 'transform 0.15s', transform: bouncing ? 'scale(0.88) rotate(-7deg)' : 'scale(1)',
    }}>
      {/* outer glow */}
      <div style={{ position: 'absolute', inset: -24, borderRadius: '50%',
        background: `radial-gradient(circle, rgba(255,107,74,0.28) 0%, transparent 70%)`,
        animation: 'glowPulse 3s ease-in-out infinite',
      }}/>
      <div className="blob-body" style={{
        width: '100%', height: '100%',
        background: `radial-gradient(ellipse at 36% 30%, ${T.blobC}, ${T.blobA} 46%, ${T.blobB})`,
        borderRadius: '62% 38% 46% 54% / 60% 44% 56% 40%',
        boxShadow: `0 0 40px rgba(255,100,60,0.35), 0 16px 40px rgba(0,0,0,0.5)`,
      }}/>
      <svg width={size} height={size} style={{ position:'absolute', inset:0, overflow:'visible' }}>
        <ellipse className="eye"   cx={cx-es} cy={ey} rx={f.ry*1.1} ry={f.ry} fill="#fff"/>
        {f.pupils && <circle cx={cx-es+2} cy={ey-1} r={f.ry*0.46} fill={T.blobB} opacity=".9"/>}
        <ellipse className="eye eye-r" cx={cx+es} cy={ey} rx={f.ry*1.1} ry={f.ry} fill="#fff"/>
        {f.pupils && <circle cx={cx+es+2} cy={ey-1} r={f.ry*0.46} fill={T.blobB} opacity=".9"/>}
        <Mouth/>
        {f.cheeks && <>
          <circle cx={cx-es-15} cy={ey+17} r={size*0.065} fill="#fff" opacity=".18"/>
          <circle cx={cx+es+15} cy={ey+17} r={size*0.065} fill="#fff" opacity=".18"/>
        </>}
      </svg>
    </div>
  );
}

// ── Streak ring ─────────────────────────────────────────────────────────────
function StreakRing({ streak, goal = 14, size = 64 }) {
  const r = size/2-5, c = 2*Math.PI*r, pct = Math.min(streak/goal,1);
  return (
    <div style={{ width:size, height:size, position:'relative', flexShrink:0 }}>
      <svg width={size} height={size}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(255,255,255,0.08)" strokeWidth={4}/>
        <circle cx={size/2} cy={size/2} r={r} fill="none"
          stroke={T.primary} strokeWidth={4}
          strokeDasharray={`${c*pct} ${c}`} strokeLinecap="round"
          transform={`rotate(-90 ${size/2} ${size/2})`}
          style={{ filter:`drop-shadow(0 0 6px ${T.primary})` }}/>
      </svg>
      <div style={{ position:'absolute', inset:0, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center' }}>
        <span style={{ fontSize:15, fontWeight:900, color:T.primary, lineHeight:1 }}>{streak}</span>
        <span style={{ fontSize:7.5, fontWeight:800, color:T.muted, letterSpacing:0.8 }}>DAYS</span>
      </div>
    </div>
  );
}

// ── Tab bar ─────────────────────────────────────────────────────────────────
function TabBar({ active, onTab }) {
  const tabs = [
    { id:'timeline',    e:'🗓', l:'Timeline' },
    { id:'tracking',   e:'📋', l:'Log' },
    { id:'baby',       e:'🌸', l:'Baby' },
    { id:'specialists',e:'🩺', l:'Doctors' },
  ];
  return (
    <div style={{ display:'flex', flexShrink:0, background:T.tabBg,
      borderTop:`0.5px solid ${T.border}`, backdropFilter:'blur(24px)', paddingBottom:22, paddingTop:8 }}>
      {tabs.map(tab => {
        const on = tab.id === active;
        return (
          <button key={tab.id} onClick={()=>onTab(tab.id)} style={{
            flex:1, background:'none', border:'none', cursor:'pointer',
            display:'flex', flexDirection:'column', alignItems:'center', gap:2, padding:'4px 0',
          }}>
            <span style={{ fontSize:20, lineHeight:1, filter:on?'none':'grayscale(1)', opacity:on?1:0.38, transition:'all 0.2s' }}>{tab.e}</span>
            <span style={{ fontSize:9.5, fontWeight:800, color:on?T.primary:T.muted, fontFamily:'Nunito', letterSpacing:0.4, transition:'color 0.2s' }}>{tab.l}</span>
            {on && <div style={{ width:18, height:3, borderRadius:2, background:T.primary, boxShadow:`0 0 6px ${T.primary}` }}/>}
          </button>
        );
      })}
    </div>
  );
}

// ── BABY TAB ────────────────────────────────────────────────────────────────
function BabyTab({ week, streak, name }) {
  const b = getWeekData(week);
  const tri = TRIMESTER(week);
  const [mood, setMood] = React.useState('happy');
  const [kicks, setKicks] = React.useState(0);
  const [kickAnim, setKickAnim] = React.useState(false);
  const [factOpen, setFactOpen] = React.useState(false);
  const [energy, setEnergy] = React.useState(b.energy);

  const addKick = () => {
    setKicks(k=>k+1);
    setKickAnim(true);
    setTimeout(()=>setKickAnim(false), 360);
  };

  const moods = [
    { id:'happy',  e:'😊', l:'Great' },
    { id:'calm',   e:'😌', l:'Calm' },
    { id:'tired',  e:'😴', l:'Tired' },
    { id:'anxious',e:'😟', l:'Worried' },
  ];

  return (
    <div className="screen" style={{ flex:1, overflowY:'auto', background:T.bg, display:'flex', flexDirection:'column' }}>
      <div style={{ height:58 }}/>

      {/* header */}
      <div style={{ padding:'0 20px', display:'flex', alignItems:'center', justifyContent:'space-between' }}>
        <div>
          <div style={{ fontSize:10.5, fontWeight:800, color:T.muted, letterSpacing:1.3, textTransform:'uppercase' }}>
            Week {week} · Trimester {tri}
          </div>
          <div style={{ fontSize:22, fontWeight:900, color:T.text, marginTop:2, lineHeight:1.2 }}>
            Hello, {name} 🌸
          </div>
        </div>
        <StreakRing streak={streak}/>
      </div>

      {/* trimester dots */}
      <div style={{ padding:'10px 20px 0', display:'flex', gap:6, alignItems:'center' }}>
        {[1,2,3].map(n => (
          <React.Fragment key={n}>
            <div style={{ height:4, flex:1, borderRadius:2, overflow:'hidden', background:'rgba(255,255,255,0.08)' }}>
              <div style={{ height:'100%', background: n < tri ? T.primary : n === tri ? `linear-gradient(90deg,${T.primary},${T.accent})` : 'transparent',
                width: n < tri ? '100%' : n === tri ? `${((week - (tri===1?0:tri===2?13:26)) / (tri===1?13:tri===2?13:14))*100}%` : '0%',
                boxShadow: n === tri ? `0 0 8px ${T.primary}` : 'none',
                transition: 'width 0.5s ease',
              }}/>
            </div>
            <span style={{ fontSize:9, color:n<=tri?T.primary:T.muted, fontWeight:800 }}>T{n}</span>
          </React.Fragment>
        ))}
      </div>

      {/* blob hero */}
      <div style={{ display:'flex', flexDirection:'column', alignItems:'center', padding:'18px 20px 6px', position:'relative' }}>
        <Blob mood={mood} size={162} onClick={()=>setFactOpen(v=>!v)}/>
        <div style={{ textAlign:'center', marginTop:8 }}>
          <div style={{ fontSize:15, fontWeight:800, color:T.text }}>About the size of a{b.size.match(/^[aeiou]/i)?'n':''} {b.e}</div>
          <div style={{ fontSize:11.5, color:T.muted, marginTop:1 }}>{b.cm} cm · {b.g >= 1000 ? (b.g/1000).toFixed(1)+'kg' : b.g+'g'} · tap me!</div>
        </div>
      </div>

      {/* fact reveal */}
      {factOpen && (
        <div className="slide-up" style={{ margin:'0 20px 12px', padding:'13px 15px',
          background:'rgba(255,107,74,0.14)', borderRadius:18, border:`1px solid rgba(255,107,74,0.3)` }}>
          <div style={{ fontSize:11, fontWeight:800, color:T.primary, marginBottom:5, letterSpacing:0.5 }}>✨ THIS WEEK'S FACT</div>
          <div style={{ fontSize:13.5, color:T.text, lineHeight:1.55 }}>{b.fact}</div>
        </div>
      )}

      {/* how you might feel */}
      <div style={{ padding:'0 20px 12px' }}>
        <Card>
          <Lbl>How you might feel</Lbl>
          <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
            {b.feel.map((f,i) => (
              <div key={i} style={{ display:'flex', alignItems:'flex-start', gap:11 }}>
                <div style={{ width:36, height:36, borderRadius:11, background:'rgba(255,255,255,0.07)',
                  display:'flex', alignItems:'center', justifyContent:'center', fontSize:17, flexShrink:0 }}>{f.i}</div>
                <div>
                  <div style={{ fontSize:13.5, fontWeight:700, color:T.text }}>{f.l}</div>
                  <div style={{ fontSize:11.5, color:T.muted, marginTop:1 }}>{f.n}</div>
                </div>
                {/* intensity dots */}
                <div style={{ marginLeft:'auto', display:'flex', gap:3, paddingTop:4 }}>
                  {[0,1,2].map(j => <div key={j} style={{ width:6, height:6, borderRadius:3,
                    background: j < (3-i) ? T.primary : 'rgba(255,255,255,0.1)' }}/>)}
                </div>
              </div>
            ))}
          </div>
        </Card>
      </div>

      {/* mood + energy row */}
      <div style={{ padding:'0 20px 12px', display:'flex', gap:10 }}>
        {/* mood */}
        <Card style={{ flex:1.6 }}>
          <Lbl>Mood now</Lbl>
          <div style={{ display:'flex', gap:6 }}>
            {moods.map(m => {
              const on = mood === m.id;
              return (
                <button key={m.id} onClick={()=>setMood(m.id)} style={{
                  flex:1, border:`1.5px solid ${on?T.primary:'transparent'}`,
                  borderRadius:12, padding:'8px 0', cursor:'pointer',
                  background: on ? 'rgba(255,107,74,0.2)' : 'rgba(255,255,255,0.05)',
                  display:'flex', flexDirection:'column', alignItems:'center', gap:3,
                  transition:'all 0.16s', transform:on?'scale(1.07)':'scale(1)',
                }}>
                  <span style={{ fontSize:18 }}>{m.e}</span>
                  <span style={{ fontSize:8.5, fontWeight:800, color:on?T.primary:T.muted, fontFamily:'Nunito' }}>{m.l}</span>
                </button>
              );
            })}
          </div>
        </Card>
        {/* energy */}
        <Card style={{ flex:1 }}>
          <Lbl>Energy</Lbl>
          <div style={{ display:'flex', flexDirection:'column', gap:5 }}>
            {[5,4,3,2,1].map(lvl => (
              <div key={lvl} onClick={()=>setEnergy(lvl)}
                style={{ height:8, borderRadius:4, cursor:'pointer',
                  background: lvl <= energy
                    ? `rgba(255,${107+lvl*10},74,${0.5+lvl*0.1})`
                    : 'rgba(255,255,255,0.06)',
                  boxShadow: lvl <= energy && lvl === energy ? `0 0 6px ${T.primary}` : 'none',
                  transition:'all 0.15s',
                }}/>
            ))}
          </div>
          <div style={{ fontSize:10, color:T.muted, marginTop:6, textAlign:'center', fontWeight:700 }}>
            {['','Low','Low','Okay','Good','Great'][energy]}
          </div>
        </Card>
      </div>

      {/* kick counter */}
      <div style={{ padding:'0 20px 12px' }}>
        <Card glow style={{ padding:0, overflow:'hidden' }}>
          <button onClick={addKick} className={kickAnim?'kick-pop':''} style={{
            width:'100%', background:'none', border:'none', cursor:'pointer', padding:'14px 16px',
            display:'flex', alignItems:'center', gap:14,
          }}>
            <div style={{ width:52, height:52, borderRadius:16, background:'rgba(255,107,74,0.18)',
              display:'flex', alignItems:'center', justifyContent:'center', fontSize:28, flexShrink:0,
              border:`1.5px solid rgba(255,107,74,0.35)`,
            }}>🦶</div>
            <div style={{ flex:1, textAlign:'left' }}>
              <div style={{ fontSize:13, fontWeight:800, color:T.text }}>Count kicks</div>
              <div style={{ fontSize:11.5, color:T.muted, marginTop:1 }}>Tap each time you feel movement</div>
            </div>
            <div style={{ textAlign:'right' }}>
              <div style={{ fontSize:26, fontWeight:900, color:T.primary, lineHeight:1 }}>{kicks}</div>
              <div style={{ fontSize:9.5, color:T.muted, fontWeight:700 }}>today</div>
            </div>
          </button>

function TrackingTab() {

  const [syms, setSyms] = React.useState([]);
  const [saved, setSaved] = React.useState(false);
  const sysList = ['Nausea','Headache','Swelling','Fatigue','Back pain'];
  const tog = s => setSyms(p => p.includes(s)?p.filter(x=>x!==s):[...p,s]);

  // Sparkline data (last 7 days fake)
  const bpData = [116,119,122,118,120,117,bp.s||118].map(Number);
  const slData = [6.5,7,6,8,7.5,7,sleep];
  const mkSparkline = (data, color, height=28) => {
    const mn=Math.min(...data), mx=Math.max(...data), range=mx-mn||1;
    const pts = data.map((v,i) => `${(i/(data.length-1))*100},${height-((v-mn)/range)*(height-4)+2}`).join(' ');
    return (
      <svg width="100%" height={height} viewBox={`0 0 100 ${height}`} preserveAspectRatio="none">
        <polyline points={pts} fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
        <circle cx={(6/6)*100} cy={height-((data[data.length-1]-mn)/range)*(height-4)+2} r="3.5" fill={color}/>
      </svg>
    );
  };

  const inp = {
    padding:'10px 12px', borderRadius:11, fontSize:14, fontWeight:700, outline:'none', fontFamily:'Nunito',

// ── STAGE ────────────────────────────────────────────────────────────────────
function Stage() {
  const [vals, setVals] = React.useState(TWEAK_DEFAULTS);
  const [tweaksOn, setTweaksOn] = React.useState(false);
  const [scale, setScale] = React.useState(1);

  React.useEffect(() => {
    const calc = () => setScale(Math.min((window.innerWidth-40)/402,(window.innerHeight-40)/874,1));
    calc();
    window.addEventListener('resize', calc);
    return () => window.removeEventListener('resize', calc);
  }, []);

  React.useEffect(() => {
    const fn = e => {
      if (e.data?.type==='__activate_edit_mode')   setTweaksOn(true);
      if (e.data?.type==='__deactivate_edit_mode') setTweaksOn(false);
    };
    window.addEventListener('message', fn);
    window.parent.postMessage({ type:'__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', fn);
  }, []);

  const setVal = (k,v) => {
    const next = {...vals,[k]:v};
    setVals(next);
    window.parent.postMessage({ type:'__edit_mode_set_keys', edits:next }, '*');
  };

  return (
    <>
      <div style={{ transform:`scale(${scale})`, transformOrigin:'center center' }}>
        <IOSDevice dark={true} width={402} height={874}>
          <BloomApp week={vals.week} streak={vals.streakDays} name={vals.name||'Sophia'}/>
        </IOSDevice>
      </div>
      <Tweaks vals={vals} onChange={setVal} visible={tweaksOn}/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Stage/>);
